spec_version: "1.1"
task_id: "automaton-operator-architecture"
created: "2026-04-16T12:00:00Z"
updated: "2026-04-16T12:00:00Z"
status: "draft"

task:
  title: "Define automaton operator architecture and ownership"
  summary: >
    Lock the full-shape architecture for automaton without leaking operator
    semantics into runx. This spec covers repo topology, public-face
    ownership, migration from the current docs/artifacts shape, lane
    contracts, canonical-vs-derived data rules, and the boundary that keeps
    runx generic.
  size: "medium"
  risk_level: "medium"
  context:
    packages:
      - "docs"
      - ".github/workflows"
      - "site"
      - ".artifacts"
      - "../runx/plans"
    related_docs:
      - "README.md"
      - "docs/introduction.md"
      - "docs/philosophy.md"
      - "docs/operating-model.md"
      - "docs/evolution.md"
      - "docs/architecture.md"
      - "../runx/plans/runx.md"
    invariants:
      - "runx_stays_primitive_only"
      - "automaton_owns_operator_semantics"
      - "public_face_stays_separate_from_runx_ai"
  objectives:
    - "Define the hard runx/automaton ownership boundary."
    - "Describe the target repo topology and site boundary."
    - "Describe the migration from today's docs/.artifacts shape to the target doctrine/state/history/reflections/site shape."
    - "Describe lane contracts in operational rather than aspirational terms."
    - "Define canonical, derived, and public data classes."
    - "Define core update rules for doctrine, state, history, reflections, and site."
    - "Define promotion rules from reflection to state to history to site."
  touchpoints:
    - area: "repo topology"
      description: "Clarify what belongs in runx, runx/cloud, and automaton."
    - area: "public face"
      description: "Keep automaton.runx.ai distinct from runx.ai."
    - area: "lane contracts"
      description: "Each lane must define artifact, approval, and memory effect."
  scope:
    in_scope:
      - "Architecture doc updates"
      - "README and docs navigation alignment"
      - "Explicit repo migration path"
      - "Lane contract matrix"
      - "Canonical-vs-derived data ownership rules"
    out_of_scope:
      - "Implementing the site"
      - "Building new workflow lanes"
      - "Database schema changes"
  dependencies:
    - "Current automaton doctrine docs remain the source for philosophy and stage language"
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "Architecture docs explicitly separate generic runtime primitives from automaton operator semantics."
        status: "pending"
      - id: "dod2"
        description: "The plan names the separate automaton public face and its content ownership."
        status: "pending"
      - id: "dod3"
        description: "Lane contracts specify artifact, approval, and memory effect."
        status: "pending"
      - id: "dod4"
        description: "The plan acknowledges the current docs/.artifacts reality and names the migration path."
        status: "pending"
      - id: "dod5"
        description: "The plan defines promotion rules and concurrent state update behavior."
        status: "pending"
    validation:
      - id: "v1"
        type: "documentation"
        description: "Architecture page includes hard boundary, repo migration, memory, core update, and promotion sections."
        command: "rg -n \"Hard Boundary|Current Reality|Repo Migration|Memory Model|Automaton Core Update Rules|Promotion Rules|Does Automaton Need SQL\\?|Lane Contract\" docs/architecture.md"
        expected: "All section headers found"
      - id: "v2"
        type: "documentation"
        description: "Sourcey docs navigation exposes the architecture page."
        command: "rg -n 'architecture' docs/sourcey.config.ts README.md"
        expected: "architecture is referenced in docs nav and repo docs list"

planning_log:
  - timestamp: "2026-04-16T12:00:00Z"
    actor: "codex"
    summary: >
      Created after correcting the prior boundary mistake. This spec makes the
      architecture explicit before any new implementation work resumes.

phases:
  - id: "phase1"
    name: "Boundary And Topology"
    objective: "Document the hard ownership split between runx and automaton."
    changes:
      - file: "docs/architecture.md"
        action: "create"
        content_spec: |
          Define the runx/automaton boundary, repo topology, and the rule that
          runx may host generic memory while automaton owns operator semantics.
          Acknowledge the current docs/.artifacts shape and the target
          doctrine/state/history/reflections/site convergence shape.
      - file: "README.md"
        action: "update"
        content_spec: |
          Link to the architecture plan from the repo overview.
    acceptance_criteria:
      - id: "ac1_1"
        type: "documentation"
        description: "Boundary language is present and explicit."
        command: "rg -n \"runx may host the machine|automaton owns the mind\" docs/architecture.md"
        expected: "boundary language present"
    status: "pending"
  - id: "phase2"
    name: "Lane Contracts"
    objective: "Turn the live lanes into explicit contracts rather than implied workflow behavior."
    dependencies: ["phase1"]
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add one lane matrix covering purpose, input, output, public artifact,
          approval mode, feed eligibility, and memory effect.
    acceptance_criteria:
      - id: "ac2_1"
        type: "documentation"
        description: "Lane contract table is present."
        command: "rg -n \"\\| lane \\| purpose \\| input \\| output \\| public artifact \\| approval mode \\| feed eligible \\| memory effect \\|\" docs/architecture.md"
        expected: "lane table present"
    status: "pending"
  - id: "phase3"
    name: "Data Ownership"
    objective: "Define canonical, derived, and public classes so future memory work has a stable contract."
    dependencies: ["phase1"]
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add the canonical-vs-derived-vs-public table and explain rebuildable
          derived context.
    acceptance_criteria:
      - id: "ac3_1"
        type: "documentation"
        description: "Data ownership table is present."
        command: "rg -n \"Canonical, Derived, Public|canonical evidence|operator projections\" docs/architecture.md"
        expected: "ownership sections present"
    status: "pending"
  - id: "phase4"
    name: "Migration Contract"
    objective: "Define how the current repo shape converges on the target operator shape."
    dependencies: ["phase1"]
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add current reality and repo migration sections that explain how
          today's docs/ + Sourcey + .artifacts layout evolves into
          doctrine/state/history/reflections/site.
    acceptance_criteria:
      - id: "ac4_1"
        type: "documentation"
        description: "Migration sections are present."
        command: "rg -n \"Current Reality|Repo Migration|Sourcey is optional tooling|\\.artifacts/\" docs/architecture.md"
        expected: "migration language present"
    status: "pending"
  - id: "phase5"
    name: "Core Update Rules"
    objective: "Define how doctrine, state, history, reflections, and site may be updated."
    dependencies: ["phase1"]
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add explicit update rules for doctrine/, state/, history/,
          reflections/, and site/ so the automaton core has filesystem-level
          governance rather than vibe-based governance.
    acceptance_criteria:
      - id: "ac5_1"
        type: "documentation"
        description: "Core update rules are present."
        command: "rg -n \"Automaton Core Update Rules|### `doctrine/`|### `state/`|### `history/`|### `reflections/`|### `site/`\" docs/architecture.md"
        expected: "core update rules present"
    status: "pending"
  - id: "phase6"
    name: "Promotion And Concurrency"
    objective: "Define promotion rules and conflict handling for automaton-managed state."
    dependencies: ["phase5"]
    changes:
      - file: "docs/architecture.md"
        action: "update"
        content_spec: |
          Add promotion rules from reflection to state to history to site, plus
          conflict rules for concurrent state updates.
    acceptance_criteria:
      - id: "ac6_1"
        type: "documentation"
        description: "Promotion and concurrency rules are present."
        command: "rg -n \"Promotion Rules|optimistic concurrency|conflicting writers must fail closed\" docs/architecture.md"
        expected: "promotion and concurrency rules present"
    status: "pending"

rollback:
  strategy: "per_phase"
  commands:
    phase1: "git checkout HEAD -- docs/architecture.md README.md"
    phase2: "git checkout HEAD -- docs/architecture.md"
    phase3: "git checkout HEAD -- docs/architecture.md"
    phase4: "git checkout HEAD -- docs/architecture.md"
    phase5: "git checkout HEAD -- docs/architecture.md"
    phase6: "git checkout HEAD -- docs/architecture.md"
