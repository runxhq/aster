phases:
  - id: "phase1"
    name: "Local preflight"
    objective: "Generate and validate the nilstate/icey-cli contribution locally before remote dispatch."
    changes:
      - file: "../icey-cli/SKILL.md"
        action: "create"
        lines: "all"
        content_spec: |
          Add a portable SKILL.md grounded in nilstate/icey-cli README, CMake,
          Makefile, workflows, Docker docs, packaging docs, VERSION, and
          ICEY_VERSION. The file must be useful without runx and mention runx
          only as optional compatible tooling.
      - file: ".artifacts/skill-contribution/icey-cli"
        action: "create"
        lines: "all"
        content_spec: |
          Store skill_opportunity, skill_research_report, skill_candidate,
          contribution_packet, public_feed_event, and pr-body artifacts.
    acceptance_criteria:
      - id: "ac1_1"
        type: "integration"
        description: "Prepare script returns contribution_ready"
        command: "node scripts/prepare-skill-contribution.mjs --target-repo-dir /home/kam/dev/icey-cli --target-repo nilstate/icey-cli --output-dir .artifacts/skill-contribution/icey-cli --workflow operator-bringup --mode requested --force"
        expected: "contribution_ready"
        result: "pass"
        executed_at: "2026-04-16T01:08:05Z"
        result_output: "{   \"status\": \"prepared\",   \"target_repo\": \"nilstate/icey-cli\",   \"skill_path\": \"../icey-cli/SKILL.md\",   \"output_dir\": \".artifacts/skill-contribution/icey-cli\",   \"state\": \"contribution_ready\",   \"ch"
      - id: "ac1_2"
        type: "test"
        description: "Validator passes"
        command: "node scripts/validate-skill-contribution.mjs --target-repo-dir /home/kam/dev/icey-cli --artifacts-dir .artifacts/skill-contribution/icey-cli"
        expected: "\"checks_passed\": 16"
        result: "pass"
        executed_at: "2026-04-16T01:08:05Z"
        result_output: "{   \"status\": \"valid\",   \"target_repo_dir\": \"/home/kam/dev/icey-cli\",   \"candidate_path\": \"SKILL.md\",   \"checks_total\": 16,   \"checks_passed\": 16 }"
    status: "completed"
  - id: "phase2"
    name: "Upstream draft PR"
    objective: "Publish the portable SKILL.md as a draft upstream PR."
    changes:
      - file: "../icey-cli"
        action: "update"
        lines: "all"
        content_spec: |
          Use scripts/publish-runx-pr.mjs from the target repo to push branch
          runx/add-skill-md and create or update a draft PR containing SKILL.md.
    acceptance_criteria:
      - id: "ac2_1"
        type: "integration"
        description: "Draft PR exists and body has public references"
        command: "gh pr view 2 --repo nilstate/icey-cli --json number,state,isDraft,headRefName,url,body"
        expected: "https://agentskills.io/specification"
        result: "pass"
        executed_at: "2026-04-16T01:08:06Z"
        result_output: "{\"body\":\"## What changed\n\nThis PR adds `SKILL.md`, a portable agent-readable workflow document for `nilstate/icey-cli`.\n\n## Why this belongs in the repo\n\nAgents already inspect README files, pac"
    status: "completed"
  - id: "phase3"
    name: "Remote workflow dogfood"
    objective: "Run the deployed aster workflow against nilstate/icey-cli."
    changes:
      - file: "GitHub Actions"
        action: "update"
        lines: "all"
        content_spec: |
          Dispatch skill-contribution.yml on auscaster/aster main with
          target_repo=nilstate/icey-cli and publish=true. Wait for the run result.
    acceptance_criteria:
