rollback:
  strategy: "manual"
  commands:
    phase1: "git -C /home/kam/dev/icey-cli checkout main && git -C /home/kam/dev/icey-cli clean -f SKILL.md"
    phase2: "gh pr close 2 --repo nilstate/icey-cli --comment 'Closing dogfood draft PR by operator request.'"
    phase3: "gh run cancel <run-id> --repo auscaster/aster"
    phase4: "No code rollback; record failed evidence state."
