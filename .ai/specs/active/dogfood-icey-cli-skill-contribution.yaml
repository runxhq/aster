spec_version: "1.1"
task_id: "dogfood-icey-cli-skill-contribution"
created: "2026-04-16T00:57:01Z"
updated: "2026-04-16T01:12:05Z"
status: "in_progress"

task:
  title: "Dogfood skill contribution on nilstate icey-cli"
  summary: >
    Execute the deployed skill-contribution lane against nilstate/icey-cli as it
    will run in production: from the GitHub Actions workflow on auscaster/aster,
    checking out the remote target repo, generating a portable SKILL.md, validating
    the artifact packet, and publishing or updating a draft PR in the target repo.
    Local generation may be used only as preflight evidence; the acceptance gate
    is the remote workflow run.
  size: "medium"
  risk_level: "medium"
  context:
    packages:
      - "aster/.github/workflows/skill-contribution.yml"
      - "aster/scripts"
      - "nilstate/icey-cli"
    files_impacted:
      - path: "../icey-cli/SKILL.md"
        lines: "all"
        reason: "Portable upstream skill file generated for the dogfood target"
      - path: ".artifacts/skill-contribution/icey-cli"
        lines: "all"
        reason: "Local preflight artifact packet for comparison with hosted run"
      - path: ".github/workflows/skill-contribution.yml"
        lines: "all"
        reason: "Hosted execution path under test"
    invariants:
      - "domain_boundaries"
      - "public_api_stable"
      - "config_from_env"
    related_docs:
      - "docs/skill-contribution.md"
      - "../runx/docs/skill-learning-contribution-spec.md"
    cwd: "/home/kam/dev/aster"
  objectives:
    - "Generate a repo-grounded portable SKILL.md for nilstate/icey-cli"
    - "Validate public-language, evidence, and artifact gates"
    - "Publish or update a draft upstream PR containing only SKILL.md"
    - "Execute the same path from the deployed GitHub Actions workflow after code is pushed"
    - "Confirm the upstream PR and target CI state"
  scope:
    in_scope:
      - "nilstate/icey-cli as first upstream contribution target"
      - "SKILL.md only in the target repo"
      - "Draft PR publication"
      - "Hosted workflow dispatch and result verification"
      - "Public evidence relay through aster workflow_run"
    out_of_scope:
      - "Merging the upstream PR"
      - "Changing nilstate/icey core repo"
      - "Adding runx x.yaml or registry binding before upstream acceptance"
      - "Publishing a runx registry skill"
  dependencies:
    - "auscaster/aster main contains skill-contribution workflow"
    - "GitHub Actions can dispatch workflow_dispatch events"
    - "The configured token can write a branch/PR to nilstate/icey-cli when publish=true"
    - "nilstate/icey-cli CI can run on the generated draft PR"
  assumptions:
    - "nilstate/icey-cli does not already have SKILL.md on main"
    - "The branch runx/add-skill-md is acceptable for repeated dogfood updates"
    - "The PR should remain draft until reviewed"
    - "If hosted publish credentials fail, the validation-only workflow result still proves the deployed preparation/validation path but publication remains blocked"
  touchpoints:
    - area: "target repo"
      description: "nilstate/icey-cli receives SKILL.md"
      owners: ["nilstate/icey-cli"]
    - area: "aster workflow"
      description: "skill-contribution workflow runs remotely with target_repo nilstate/icey-cli"
      owners: ["aster"]
    - area: "upstream PR"
      description: "Draft PR #2 carries the portable skill contribution"
      owners: ["nilstate/icey-cli"]
    - area: "public evidence"
      description: "publish-public-evidence receives workflow_run for skill-contribution"
      owners: ["aster", "runx/cloud"]
  risks:
    - description: "Remote workflow cannot push to nilstate/icey-cli because token is scoped only to aster"
      impact: "high"
      mitigation: "Use UPSTREAM_CONTRIBUTION_TOKEN or RUNX_WORKSPACE_PAT; if missing, rerun with publish=false and record publication as blocked"
    - description: "Generated SKILL.md is too broad or stale"
      impact: "medium"
      mitigation: "Validate against current README, Makefile, CMake, workflows, packaging, Docker, VERSION, and ICEY_VERSION"
    - description: "Target CI may take longer than the operator wait window"
      impact: "medium"
      mitigation: "Record in-progress state and provide run URL; do not mark remote dogfood complete until workflow result is known"
  acceptance:
    validation_profile: "strict"
    definition_of_done:
      - id: "dod1"
        description: "Local preflight generated nilstate/icey-cli SKILL.md and artifact packet"
        status: "done"
        checked_at: "2026-04-16T01:08:05Z"
      - id: "dod2"
        description: "Local validator passed against generated SKILL.md and artifacts"
        status: "done"
        checked_at: "2026-04-16T01:08:05Z"
      - id: "dod3"
        description: "Draft upstream PR exists, contains only SKILL.md, and uses credible Agent Skills references in the PR body"
        status: "done"
        checked_at: "2026-04-16T01:08:06Z"
      - id: "dod4"
        description: "Hosted skill-contribution workflow was dispatched from auscaster/aster main"
        status: "done"
        checked_at: "2026-04-16T01:04:24Z"
      - id: "dod5"
        description: "Hosted workflow completed successfully or records a concrete credential blocker"
        status: "done"
        checked_at: "2026-04-16T01:04:36Z"
      - id: "dod6"
        description: "Upstream PR CI result is checked, recorded, and green"
        status: "done"
        checked_at: "2026-04-16T01:11:54Z"
      - id: "dod7"
        description: "Public evidence relay for skill-contribution is checked"
        status: "done"
        checked_at: "2026-04-16T01:08:10Z"
    validation:
      - id: "v1"
        type: "integration"
        description: "Prepare target contribution locally as preflight"
        command: "node scripts/prepare-skill-contribution.mjs --target-repo-dir /home/kam/dev/icey-cli --target-repo nilstate/icey-cli --output-dir .artifacts/skill-contribution/icey-cli --workflow operator-bringup --mode requested --force"
        expected: "contribution_ready"
      - id: "v2"
        type: "test"
        description: "Validate local contribution packet"
        command: "node scripts/validate-skill-contribution.mjs --target-repo-dir /home/kam/dev/icey-cli --artifacts-dir .artifacts/skill-contribution/icey-cli"
        expected: "\"checks_passed\": 16"
      - id: "v3"
        type: "integration"
        description: "Upstream draft PR exists and cites public Agent Skills references"
        command: "gh pr view 2 --repo nilstate/icey-cli --json number,state,isDraft,headRefName,url,body"
        expected: "https://agentskills.io/specification"
      - id: "v4"
        type: "integration"
        description: "Remote workflow run succeeded"
        command: "gh run view 24486417144 --repo auscaster/aster --json databaseId,status,conclusion,url"
        expected: "\"conclusion\":\"success\""
      - id: "v5"
        type: "integration"
        description: "Remote skill-contribution run completes"
        command: "gh run view 24486417144 --repo auscaster/aster --json databaseId,status,conclusion,url"
        expected: "\"status\":\"completed\""
      - id: "v6"
        type: "integration"
        description: "Target PR CI checked"
        command: "gh pr view 2 --repo nilstate/icey-cli --json statusCheckRollup"
        expected: "SUCCESS"
  constraints:
    approvals_required: []
    non_goals:
      - "No merge"
      - "No registry binding"
      - "No upstream files other than SKILL.md"
  info_sources:
    - "nilstate/icey-cli README.md"
    - "nilstate/icey-cli Makefile"
    - "nilstate/icey-cli CMakeLists.txt"
    - "nilstate/icey-cli CMakePresets.json"
    - "nilstate/icey-cli .github/workflows/*.yml"
    - "nilstate/icey-cli docker/README.md"
    - "nilstate/icey-cli packaging/README.md"
  notes: >
    This dogfood spec intentionally requires the deployed GitHub workflow to run.
    Local publication is not sufficient proof.

