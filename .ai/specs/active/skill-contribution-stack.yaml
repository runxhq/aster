phases:
  - id: "phase1"
    name: "Runx strategy and implementation spec"
    objective: "Make the stack explicit in runx plan and write the complete runx implementation contract."
    changes:
      - file: "../runx/plans/runx.md"
        action: "update"
        lines: "all"
        content_spec: |
          Replace vague adoption language with skill-learning, skill-contribution,
          registry-binding, and proof-wall layering. Define upstream SKILL.md as
          the portable artifact and keep x.yaml/policy/harness/trust in runx.
      - file: "../runx/docs/skill-learning-contribution-spec.md"
        action: "create"
        lines: "all"
        content_spec: |
          Add vocabulary, public/private language, layer stack, state machine,
          JSON artifact contracts, workflow specs, repo responsibilities, quality
          gates, proof-wall events, build plan, and acceptance criteria.
    acceptance_criteria:
      - id: "ac1_1"
        type: "documentation"
        description: "Plan references the implementation spec and names all layers"
        command: "rg -n 'Skill Learning, Contribution|skill-contribution|registry-binding|implementation contract' ../runx/plans/runx.md ../runx/docs/skill-learning-contribution-spec.md"
        expected: "Skill Learning, Contribution"
        result: "pass"
        executed_at: "2026-04-16T01:06:22Z"
        result_output: "../runx/plans/runx.md:3747:## Skill Learning, Contribution, And Registry Binding ../runx/plans/runx.md:3869:The implementation contract for this stack lives in ../runx/plans/runx.md:3927:- `skill-cont"
    status: "completed"
  - id: "phase2"
    name: "Artifact schemas and scripts"
    objective: "Create machine-readable schemas plus preparation and validation scripts."
    changes:
      - file: "schemas/skill-contribution-artifacts.schema.json"
        action: "create"
        lines: "all"
        content_spec: |
          Define JSON Schema for opportunity, research report, candidate,
          contribution packet, and public feed event artifacts.
      - file: "scripts/prepare-skill-contribution.mjs"
        action: "create"
        lines: "all"
        content_spec: |
          Inspect a target repo, collect evidence files, generate portable
          SKILL.md, write artifact JSON, and write maintainer-facing PR body.
      - file: "scripts/validate-skill-contribution.mjs"
        action: "create"
        lines: "all"
        content_spec: |
          Validate generated artifacts, required SKILL.md sections, optional runx
          wording, public-language restrictions, source references, and change
          scope.
    acceptance_criteria:
      - id: "ac2_1"
        type: "compile"
        description: "Scripts parse"
        command: "node --check scripts/prepare-skill-contribution.mjs && node --check scripts/validate-skill-contribution.mjs"
        expected: "exit code 0"
        result: "pass"
        executed_at: "2026-04-16T01:05:41Z"
      - id: "ac2_2"
        type: "test"
        description: "Schema parses"
        command: "python3 -c \"import json; json.load(open('schemas/skill-contribution-artifacts.schema.json')); print('schema ok')\""
        expected: "schema ok"
        result: "pass"
        executed_at: "2026-04-16T01:06:22Z"
        result_output: "schema ok"
    status: "completed"
  - id: "phase3"
    name: "Hosted workflow and public evidence"
    objective: "Deploy the contribution lane and expose it to public evidence publishing."
    changes:
      - file: ".github/workflows/skill-contribution.yml"
        action: "create"
        lines: "all"
        content_spec: |
          Add manual dispatch workflow with target repo/ref/mode/publish/force
          inputs. Checkout aster and target repo, prepare, validate, optionally
          publish draft PR, and upload artifacts.
      - file: ".github/workflows/publish-public-evidence.yml"
        action: "update"
        lines: "all"
        content_spec: |
          Include skill-contribution workflow_run events and map the proof lane
          to skill-contribution with a contribution-specific summary.
    acceptance_criteria:
      - id: "ac3_1"
        type: "boundary"
        description: "Workflow YAML parses"
        command: "python3 -c \"import yaml; [yaml.safe_load(open(p)) for p in ['.github/workflows/skill-contribution.yml', '.github/workflows/publish-public-evidence.yml']]; print('workflow ok')\""
        expected: "workflow ok"
        result: "pass"
        executed_at: "2026-04-16T01:06:22Z"
        result_output: "workflow ok"
    status: "completed"
  - id: "phase4"
