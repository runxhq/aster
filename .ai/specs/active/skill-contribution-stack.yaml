spec_version: "1.1"
task_id: "skill-contribution-stack"
created: "2026-04-16T00:57:00Z"
updated: "2026-04-16T01:08:20Z"
status: "in_progress"

task:
  title: "Implement upstream skill contribution stack"
  summary: >
    Build the full upstream skill-contribution stack for aster and runx:
    strategy docs, machine-readable artifact schemas, executable preparation
    and validation scripts, a deployed GitHub Actions workflow, proof-wall
    evidence wiring, and Sourcey docs coverage. The stack must preserve the
    boundary that upstream repos receive portable SKILL.md only while runx
    keeps x.yaml, harnesses, auth, trust tier, and registry binding metadata.
  size: "large"
  risk_level: "medium"
  context:
    packages:
      - "aster/.github/workflows"
      - "aster/scripts"
      - "aster/schemas"
      - "aster/docs"
      - "runx/plans"
      - "runx/docs"
    files_impacted:
      - path: "../runx/plans/runx.md"
        lines: "all"
        reason: "Clarify the strategy stack and public/private language boundary"
      - path: "../runx/docs/skill-learning-contribution-spec.md"
        lines: "all"
        reason: "Formal implementation contract for learning, contribution, binding, and proof"
      - path: ".github/workflows/skill-contribution.yml"
        lines: "all"
        reason: "Hosted execution lane for remote upstream SKILL.md preparation and PR publication"
      - path: ".github/workflows/publish-public-evidence.yml"
        lines: "all"
        reason: "Expose skill-contribution as a public evidence lane"
      - path: "scripts/prepare-skill-contribution.mjs"
        lines: "all"
        reason: "Generate upstream SKILL.md and artifact packets from target repo evidence"
      - path: "scripts/validate-skill-contribution.mjs"
        lines: "all"
        reason: "Gate generated contributions before public PR publication"
      - path: "schemas/skill-contribution-artifacts.schema.json"
        lines: "all"
        reason: "Machine-readable schema for contribution artifact packets"
      - path: "docs/skill-contribution.md"
        lines: "all"
        reason: "Operator documentation for the lane"
      - path: "docs/run-catalog.md"
        lines: "all"
        reason: "Declare the new lane in the public run catalog"
      - path: "docs/flows.md"
        lines: "all"
        reason: "Describe hosted workflow behavior"
      - path: "docs/operations.md"
        lines: "all"
        reason: "Document credentials, draft PR policy, and operational gaps"
      - path: "docs/sourcey.config.ts"
        lines: "all"
        reason: "Expose skill-contribution docs in generated Sourcey docs"
      - path: "scripts/check.mjs"
        lines: "all"
        reason: "Make new specs, scripts, docs, schema, and workflow required repo files"
    invariants:
      - "domain_boundaries"
      - "public_api_stable"
      - "config_from_env"
      - "no_legacy_code"
    related_docs:
      - "../runx/docs/skill-learning-contribution-spec.md"
      - "docs/skill-contribution.md"
      - "docs/run-catalog.md"
      - "docs/flows.md"
      - "docs/operations.md"
    cwd: "/home/kam/dev/aster"
  objectives:
    - "Define skill-learning, skill-contribution, registry-binding, and proof-wall as separate layers with explicit ownership"
    - "Create a machine-readable artifact schema for opportunity, research, candidate, contribution, and feed-event packets"
    - "Create scripts that prepare and validate portable upstream SKILL.md contributions from target repo evidence"
    - "Deploy a GitHub Actions workflow that runs the same path remotely and optionally publishes a draft upstream PR"
    - "Wire skill-contribution into public evidence publishing and Sourcey docs"
    - "Keep upstream PR language contribution-oriented and non-marketing"
  scope:
    in_scope:
      - "Aster orchestration for upstream SKILL.md contributions"
      - "Runx strategy and implementation-spec documentation"
      - "JSON artifact contracts and validation gates"
      - "Remote workflow dispatch readiness"
      - "First dogfood target support for nilstate/icey-cli"
    out_of_scope:
      - "Automatic merge of upstream PRs"
      - "Registry binding implementation after upstream merge"
      - "Changing nilstate/icey core repo in this task"
      - "Adding x.yaml to upstream repos"
      - "Replacing objective-to-skill internals"
  dependencies:
    - "GitHub CLI authenticated with repo scope for manual verification"
    - "GitHub Actions availability on auscaster/aster"
    - "UPSTREAM_CONTRIBUTION_TOKEN or RUNX_WORKSPACE_PAT for cross-repo publishing from hosted workflow"
    - "Sourcey CLI available through npx for docs build"
  assumptions:
    - "Aster is the correct owner for upstream PR orchestration"
    - "Runx core remains the owner of portable skill primitives and registry binding format"
    - "External repos should receive SKILL.md only unless maintainers explicitly request more"
    - "The first hosted dogfood can target nilstate/icey-cli because it has clear build, release, packaging, and operator workflows"
  touchpoints:
    - area: "runx strategy"
      description: "Make the learning/contribution/binding stack explicit in the long-form runx plan"
      owners: ["runx"]
    - area: "runx implementation spec"
      description: "Document state machine, artifacts, workflow ownership, quality gates, and proof-wall events"
      owners: ["runx"]
    - area: "aster scripts"
      description: "Prepare and validate upstream SKILL.md contribution packets"
      owners: ["aster"]
    - area: "aster workflow deployment"
      description: "Run contribution lane in GitHub Actions against external repositories"
      owners: ["aster"]
    - area: "aster Sourcey docs"
      description: "Publish operator docs for the new lane"
      owners: ["aster"]
    - area: "public evidence"
      description: "Map skill-contribution workflow runs onto the live proof wall"
      owners: ["aster", "runx/cloud"]
  risks:
    - description: "Public upstream PR language could read like runx marketing"
      impact: "high"
      mitigation: "Validator rejects public strategy terms and generated PR body keeps runx to an optional compatibility sentence"
    - description: "Hosted workflow may not have cross-repo write credentials"
      impact: "medium"
      mitigation: "Workflow supports UPSTREAM_CONTRIBUTION_TOKEN or RUNX_WORKSPACE_PAT and can run with publish=false for validation-only proof"
    - description: "Generated SKILL.md could become generic and unhelpful"
      impact: "high"
      mitigation: "Preparation script grounds output in explicit target repo files and validator requires evidence/workflow/safety sections"
    - description: "Unrelated dirty aster files could be accidentally committed"
      impact: "medium"
      mitigation: "Stage only explicit files for this stack and leave supervisor edits untouched"
  acceptance:
    validation_profile: "strict"
    definition_of_done:
      - id: "dod1"
        description: "runx plan clearly separates skill-learning, skill-contribution, registry-binding, and proof-wall evidence"
        status: "done"
        checked_at: "2026-04-16T01:06:22Z"
      - id: "dod2"
        description: "A detailed runx implementation spec exists for the complete stack"
        status: "done"
        checked_at: "2026-04-16T01:06:22Z"
      - id: "dod3"
        description: "Aster contains machine-readable JSON schema for contribution artifacts"
        status: "done"
        checked_at: "2026-04-16T01:06:22Z"
      - id: "dod4"
        description: "Aster can prepare a repo-grounded SKILL.md and contribution packet"
        status: "done"
        checked_at: "2026-04-16T01:05:41Z"
      - id: "dod5"
        description: "Aster can validate public-language, source-reference, and artifact gates before publication"
        status: "done"
        checked_at: "2026-04-16T01:05:41Z"
      - id: "dod6"
        description: "Hosted skill-contribution workflow is deployed on main"
        status: "done"
        checked_at: "2026-04-16T01:06:22Z"
      - id: "dod7"
        description: "Sourcey docs include the skill-contribution operator page"
        status: "done"
        checked_at: "2026-04-16T01:05:53Z"
      - id: "dod8"
        description: "Remote dogfood spec is ready to execute against nilstate/icey-cli"
        status: "done"
        checked_at: "2026-04-16T01:08:20Z"
    validation:
      - id: "v1"
        type: "test"
        description: "Aster required-file check passes"
        command: "npm run check"
        expected: "aster check passed"
      - id: "v2"
        type: "documentation"
        description: "Sourcey docs build includes skill-contribution page"
        command: "npm run docs:build"
        expected: "Sourcey build exits 0"
      - id: "v3"
        type: "compile"
        description: "New Node scripts parse"
        command: "node --check scripts/prepare-skill-contribution.mjs && node --check scripts/validate-skill-contribution.mjs"
        expected: "exit code 0"
      - id: "v4"
        type: "boundary"
        description: "Workflow YAML and JSON schema parse"
        command: "python3 -c \"import json, yaml; json.load(open('schemas/skill-contribution-artifacts.schema.json')); [yaml.safe_load(open(p)) for p in ['.github/workflows/skill-contribution.yml', '.github/workflows/publish-public-evidence.yml']]; print('ok')\""
        expected: "ok"
      - id: "v5"
        type: "boundary"
        description: "No whitespace errors in changed files"
        command: "git diff --check"
        expected: "exit code 0"
      - id: "v6"
        type: "integration"
        description: "Remote workflow exists after push"
        command: "gh workflow view skill-contribution.yml --repo auscaster/aster"
        expected: "workflow is visible"
  constraints:
    approvals_required: []
    non_goals:
      - "No auto-merge"
      - "No upstream x.yaml"
      - "No registry publication before upstream acceptance"
  info_sources:
    - "../runx/plans/runx.md"
    - "../runx/docs/skill-learning-contribution-spec.md"
    - "docs/skill-contribution.md"
    - "nilstate/icey-cli README, Makefile, CMake, workflow, Docker, packaging, and release files"
  notes: >
    This spec is the implementation contract for the stack. A separate dogfood
    spec records the first remote execution against nilstate/icey-cli.

