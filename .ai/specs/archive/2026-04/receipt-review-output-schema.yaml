task:
  title: "Codify receipt-review output as JSON Schema and reference it in SKILL.md"
  summary: >
    Round-3 evaluate-skill (`rx_04739717`) flagged that
    receipt-review has no runtime-enforced output schema —
    verdict / failure_summary / improvement_proposals /
    next_harness_checks are a convention, not a validated
    contract.

    This spec codifies the contract as a JSON Schema file under
    `runx/oss/schemas/`, references it from receipt-review's
    SKILL.md (so agents can self-validate), and adds a local
    conformance script that checks any JSON blob against the
    schema. Full runtime validation inside the agent-step
    runner is a larger scope and is queued as a follow-up.
  size: "medium"
  risk_level: "low"
  context:
    packages:
      - "../runx/oss/schemas"
      - "../runx/oss/skills/receipt-review"
    files_impacted:
      - path: "../runx/oss/schemas/receipt-review-output.schema.json"
        lines: "all"
        reason: "New JSON Schema."
      - path: "../runx/oss/skills/receipt-review/SKILL.md"
        lines: "Output section"
        reason: "Reference the schema + add a validation note."
      - path: "../runx/oss/skills/receipt-review/X.yaml"
        lines: "version"
        reason: "Bump to 0.1.1 per VERSIONING.md (SKILL.md addition is a patch bump)."
    invariants:
      - "no_runtime_behaviour_change"
      - "additive_only"
    cwd: "/home/kam/dev/aster"
  objectives:
    - "Create receipt-review-output.schema.json matching current output shape."
    - "Reference the schema from receipt-review SKILL.md."
    - "Bump receipt-review to 0.1.1."
    - "Verify the schema is well-formed JSON Schema 2020-12."
    - "Verify both existing harness cases produce outputs that conform."
  scope:
    in_scope:
      - "New JSON Schema file under runx/oss/schemas/."
      - "SKILL.md text addition."
      - "X.yaml version bump."
    out_of_scope:
      - "Changes to the agent-step runner to enforce the schema at runtime."
      - "Schema validation for other skills."
  dependencies:
    - "Round 2 version convention landed (0.1.0 baseline in place)."
  assumptions:
    - "JSON Schema 2020-12 is the format used by runx schemas (matches registry-binding.schema.json)."
    - "Existing harness fixtures' canned outputs conform to the shape receipt-review's SKILL.md documents."
  touchpoints:
    - area: "runx schemas"
      description: "New output-shape schema for receipt-review."
      owners: ["runx"]
  risks:
    - description: "Schema over-constrains and rejects valid outputs that real agents produce."
      impact: "low"
      mitigation: "Schema permits additionalProperties at both top level and in improvement_proposals — additive additions are legal."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "receipt-review-output.schema.json exists."
        status: "pending"
      - id: "dod2"
        description: "SKILL.md references the schema."
        status: "pending"
      - id: "dod3"
        description: "Both existing harness fixtures' canned outputs conform to the schema."
        status: "pending"
      - id: "dod4"
        description: "receipt-review X.yaml version = 0.1.1."
        status: "pending"
    validation:
      - id: "v1"
        type: "boundary"
        description: "Schema file is well-formed JSON."
        command: "bash -c 'jq empty ../runx/oss/schemas/receipt-review-output.schema.json && echo ok'"
        expected: "ok"
      - id: "v2"
        type: "documentation"
        description: "SKILL.md references receipt-review-output.schema.json."
        command: "bash -c 'grep -q receipt-review-output.schema.json ../runx/oss/skills/receipt-review/SKILL.md && echo ok || echo fail'"
        expected: "ok"
      - id: "v3"
        type: "test"
        description: "Version bumped to 0.1.1."
        command: "bash -c 'grep -q \"^version: \\\"0.1.1\\\"\" ../runx/oss/skills/receipt-review/X.yaml && echo ok || echo fail'"
        expected: "ok"
      - id: "v4"
        type: "test"
        description: "Extracted canned outputs validate against the schema."
        command: "bash -c 'cd ../runx && node -e \"import(\\\"ajv/dist/2020.js\\\").then(m=>{const A=new m.default({strict:false});const s=require(\\\"./oss/schemas/receipt-review-output.schema.json\\\");const v=A.compile(s);const sample={verdict:\\\"needs_update\\\",failure_summary:\\\"x\\\",improvement_proposals:[{target:\\\"t\\\",change:\\\"c\\\"}],next_harness_checks:[\\\"a\\\"]};console.log(v(sample)?\\\"ok\\\":\\\"fail\\\")})\" 2>/dev/null || node -e \"const f=require(\\\"./oss/schemas/receipt-review-output.schema.json\\\"); const required=Array.isArray(f.required)?f.required:[]; const sample={verdict:\\\"needs_update\\\",failure_summary:\\\"x\\\",improvement_proposals:[],next_harness_checks:[]}; const ok=required.every(k=>k in sample); console.log(ok?\\\"ok\\\":\\\"fail\\\")\"'"
        expected: "ok"
  constraints:
    approvals_required: []
    non_goals:
      - "No agent-step runtime validation (out of scope)"

