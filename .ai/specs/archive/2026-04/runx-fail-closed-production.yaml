task:
  title: "Runx CLI fails closed on unresolved cognitive work when RUNX_PRODUCTION=1"
  summary: >
    Round-3 objective-decompose (`rx_dc720d86`) surfaced the gap:
    runx runs that reach a cognitive-work request without a
    resolver silently return status=needs_resolution. In hosted
    / production contexts nobody ever resumes, so runs hang
    indefinitely. This spec adds an opt-in fail-closed policy:
    when `RUNX_PRODUCTION=1` (or `--production` flag) is set,
    unresolved cognitive work produces a non-zero exit and a
    clear error rather than returning needs_resolution.

    Default behaviour is unchanged (harness + interactive runs
    still pause). Dogfood `dogfood-cycle-8` and later fixtures
    are unaffected because they run with canned caller.answers.
  size: "medium"
  risk_level: "medium"
  context:
    packages:
      - "../runx/oss/packages/cli"
    files_impacted:
      - path: "../runx/oss/packages/cli/src/index.ts"
        lines: "needs_resolution write paths"
        reason: "Gate on production mode and exit non-zero with a clear error message."
    invariants:
      - "default_behaviour_unchanged"
      - "harness_runs_unaffected"
    cwd: "/home/kam/dev/aster"
  objectives:
    - "Detect RUNX_PRODUCTION=1 (or --production flag) at CLI dispatch."
    - "When set, treat status=needs_resolution from runLocalSkill/runLocalChain as a hard error."
    - "Exit with a clear diagnostic that names the outstanding request id(s)."
    - "Leave default behaviour unchanged for harness runs and interactive dev use."
  scope:
    in_scope:
      - "CLI-layer gate in packages/cli/src/index.ts."
    out_of_scope:
      - "Changes to runner-local runResolvedSkill or runLocalChain."
      - "Harness behaviour."
      - "New env-var conventions elsewhere."
  dependencies:
    - "F1 (runx history filter flags) landed so we build off the current CLI baseline."
  assumptions:
    - "CLI consumers can opt in via env var; the flag is a convenience alias."
    - "Existing JSON emit path still applies for non-production runs."
  touchpoints:
    - area: "runx CLI"
      description: "Production-mode gate added."
      owners: ["runx"]
  risks:
    - description: "Tests or CI pipelines that implicitly depend on needs_resolution as an exit code might break if they ever set RUNX_PRODUCTION=1."
      impact: "low"
      mitigation: "Opt-in only; documented as explicit production contract."
  acceptance:
    validation_profile: "standard"
    definition_of_done:
      - id: "dod1"
        description: "`runx <skill> --non-interactive` returns needs_resolution as today (default)."
        status: "pending"
      - id: "dod2"
        description: "With RUNX_PRODUCTION=1, the same run exits non-zero with the needs_resolution diagnostic."
        status: "pending"
      - id: "dod3"
        description: "Harness runs still pass (they never hit the fail-closed path because fixtures supply answers)."
        status: "pending"
    validation:
      - id: "v1"
        type: "test"
        description: "Default behaviour: harness-author without inputs exits 0 with status needs_resolution."
        command: "bash -c 'cd /home/kam/dev/runx && runx oss/skills/harness-author --json --non-interactive > /tmp/ha.json 2>&1; jq -r .status /tmp/ha.json'"
        expected: "needs_resolution"
      - id: "v2"
        type: "test"
        description: "Production mode: same invocation exits non-zero."
        command: "bash -c 'cd /home/kam/dev/runx && RUNX_PRODUCTION=1 runx oss/skills/harness-author --json --non-interactive > /tmp/ha-prod.json 2>&1; ec=$?; [ $ec -ne 0 ] && echo ok || echo \"unexpected exit $ec\"'"
        expected: "ok"
      - id: "v3"
        type: "test"
        description: "Harness still passes unchanged."
        command: "bash -c 'cd /home/kam/dev/runx && fail=0; for s in improve-skill receipt-review issue-to-pr; do st=$(runx harness oss/skills/$s --json 2>/dev/null | jq -r .status); [ \"$st\" = success ] || fail=1; done; [ $fail -eq 0 ] && echo ok || echo fail'"
        expected: "ok"
  constraints:
    approvals_required: []
    non_goals:
      - "No runner-local changes"
      - "No new exit-code conventions elsewhere"

