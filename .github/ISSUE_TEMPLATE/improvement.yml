name: Improvement
description: Propose a bounded improvement for aster or one of its runx lanes.
title: "[improvement] "
body:
  - type: markdown
    attributes:
      value: |
        This issue is the living ledger for one improvement thread.

        Keep amendments, approvals, and machine updates in this same issue so
        the whole work thread stays legible in one place.
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: What should change?
      placeholder: Improve the repo story so runx can draft clearer operator updates.
    validations:
      required: true
  - type: input
    id: target_repo
    attributes:
      label: Target Repo
      description: Optional repo to target if this improvement is not for this repo.
      placeholder: runxhq/aster
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What repo context, evidence, or receipts should the run use?
  - type: textarea
    id: safety
    attributes:
      label: Safety Notes
      description: What should stay thread-teaching-gated or out of scope?
