name: Fix PR
description: Submit one bounded bugfix work issue that aster should turn into a draft PR.
title: "[fix] "
body:
  - type: markdown
    attributes:
      value: |
        This work issue is the living ledger for one bounded bugfix.

        Open it once, then keep refining it by replying in the same thread.
        Trusted maintainer replies become amendments, rerun `fix-pr`, and keep
        the full context, machine updates, and publish authorization in one place.

        The draft PR is refreshed only after the same work issue authorizes
        `fix-pr.publish`.
  - type: input
    id: target_repo
    attributes:
      label: Target Repo
      description: Repo to mutate. Leave blank to target this repo.
      placeholder: nilstate/aster
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: Describe the single bounded bug that should be fixed.
      placeholder: Fix the activity feed ordering so the newest proof appears first.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true before the draft PR is useful?
      placeholder: The feed sorts correctly, the affected tests pass, and no unrelated surfaces change.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Repro steps, file paths, receipts, or prior failures that should shape the run.
  - type: input
    id: target_ref
    attributes:
      label: Target Ref
      description: Optional target branch or ref.
      placeholder: main
  - type: textarea
    id: safety
    attributes:
      label: Safety Constraints
      description: What must stay out of scope or thread-teaching-gated?
      placeholder: Keep the change to one repo surface. No feature work or unrelated cleanup.
