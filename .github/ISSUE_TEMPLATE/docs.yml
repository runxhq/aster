name: Docs PR
description: Submit one bounded docs or explanation work issue that aster should turn into a draft PR.
title: "[docs] "
body:
  - type: markdown
    attributes:
      value: |
        This work issue is the living ledger for one bounded docs change.

        Open it once, then keep refining it by replying in the same thread.
        Trusted maintainer replies become amendments, rerun `docs-pr`, and keep
        the full context, machine updates, and publish authorization in one place.

        The draft PR is refreshed only after the same work issue authorizes
        `docs-pr.publish`.
  - type: input
    id: target_repo
    attributes:
      label: Target Repo
      description: Repo to mutate. Leave blank to target this repo.
      placeholder: nilstate/aster
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: Describe the single bounded docs or explanation change.
      placeholder: Clarify how the work issue ledger retriggers dedicated lanes from trusted replies.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true before the draft PR is useful?
      placeholder: The docs explain the live flow clearly, the docs build still passes, and no unrelated files change.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant file paths, receipts, or current wording that should shape the run.
  - type: input
    id: target_ref
    attributes:
      label: Target Ref
      description: Optional target branch or ref.
      placeholder: main
  - type: textarea
    id: safety
    attributes:
      label: Safety Constraints
      description: What must stay out of scope or thread-teaching-gated?
      placeholder: Keep the change docs-only. Do not widen into feature work or doctrine edits.
