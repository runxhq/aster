name: Issue to PR
description: Submit one bounded repo change that aster should attempt to turn into a draft PR.
title: "[issue-to-pr] "
body:
  - type: markdown
    attributes:
      value: |
        This issue is the living ledger for one bounded work thread.

        Open it once, then keep refining it by replying in the same thread.
        Trusted maintainer replies retrigger the relevant lane from the refreshed
        issue ledger instead of splitting context across new issues.

        If the request is clearly a pure bugfix or a docs-only change, prefer
        the dedicated `Fix PR` or `Docs PR` template so the owning lane starts
        from the first issue event.
  - type: input
    id: target_repo
    attributes:
      label: Target Repo
      description: Repo to mutate. Leave blank to target this repo.
      placeholder: runxhq/aster
  - type: textarea
    id: objective
    attributes:
      label: Objective
      description: Describe the single bounded change that should land as a PR.
      placeholder: Update the docs so the live flows page explains the skill-learning lane.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: What must be true before the draft PR is useful?
      placeholder: The docs mention the new workflow, the Sourcey site still builds, and no unrelated files change.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant file paths, receipts, or repo context.
  - type: input
    id: target_ref
    attributes:
      label: Target Ref
      description: Optional target branch or ref.
      placeholder: main
  - type: textarea
    id: safety
    attributes:
      label: Safety Constraints
      description: What must stay out of scope or thread-teaching-gated?
      placeholder: No secret handling changes. Keep the change docs-only.
