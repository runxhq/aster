name: runx-dogfood

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  live-draft-runs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out automaton
        uses: actions/checkout@v6

      - name: Check out runx OSS
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.RUNX_REPOSITORY || 'nilstate/runx' }}
          ref: ${{ vars.RUNX_REF || 'main' }}
          path: runx
          token: ${{ secrets.RUNX_REPOSITORY_PAT != '' && secrets.RUNX_REPOSITORY_PAT || secrets.RUNX_WORKSPACE_PAT != '' && secrets.RUNX_WORKSPACE_PAT || github.token }}

      - name: Materialize runx OSS submodule
        env:
          RUNX_REPOSITORY_TOKEN: ${{ secrets.RUNX_REPOSITORY_PAT != '' && secrets.RUNX_REPOSITORY_PAT || secrets.RUNX_WORKSPACE_PAT != '' && secrets.RUNX_WORKSPACE_PAT || github.token }}
        run: |
          git -C runx config -f .gitmodules submodule.oss.url "https://x-access-token:${RUNX_REPOSITORY_TOKEN}@github.com/auscaster/runx.git"
          git -C runx submodule sync -- oss
          git -C runx submodule update --init --depth 1 oss

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable corepack
        run: corepack enable

      - name: Install and build runx
        run: |
          pnpm --dir runx/oss install --no-frozen-lockfile
          pnpm --dir runx/oss build

      - name: Run live dogfood lane
        env:
          RUNX_ROOT: ${{ github.workspace }}/runx
          ARTIFACT_DIR: ${{ github.workspace }}/automaton-artifacts
          AUTOMATON_ROOT: ${{ github.workspace }}
          RUNX_DOGFOOD_PROFILE: minimal
        run: |
          chmod +x scripts/runx-dogfood.sh
          bash scripts/runx-dogfood.sh
          node scripts/summarize-dogfood.mjs "$ARTIFACT_DIR" > "$ARTIFACT_DIR/summary.md"

      - name: Append workflow summary
        run: cat "${{ github.workspace }}/automaton-artifacts/summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload dogfood artifacts
        uses: actions/upload-artifact@v4
        with:
          name: automaton-dogfood
          path: ${{ github.workspace }}/automaton-artifacts
