name: rollback

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: Repo containing the issue or PR. Defaults to this repo.
        required: false
        type: string
      mode:
        description: Correction mode.
        required: true
        type: choice
        options:
          - issue-comment
          - pr-comment
          - generated-pr
      issue_number:
        description: Issue number for issue-comment mode.
        required: false
        type: string
      pr_number:
        description: PR number for pr-comment or generated-pr mode.
        required: false
        type: string
      comment_id:
        description: Superseded comment id, if known.
        required: false
        type: string
      reason:
        description: Public reason for the correction.
        required: true
        type: string
      replacement_body:
        description: Optional corrected guidance to append.
        required: false
        type: string
      force:
        description: Allow generated-pr rollback outside runx/* branches.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: rollback-${{ github.event.inputs.target_repo || github.repository }}-${{ github.event.inputs.issue_number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ASTER_GH_TOKEN != '' && secrets.ASTER_GH_TOKEN || github.token }}
    steps:
      - name: Check out aster
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Execute rollback
        run: |
          mkdir -p .artifacts/rollback
          TARGET_REPO="${{ github.event.inputs.target_repo || github.repository }}"
          ARGS=(
            --mode "${{ inputs.mode }}"
            --repo "$TARGET_REPO"
            --reason "${{ inputs.reason }}"
          )
          if [ -n "${{ inputs.issue_number }}" ]; then
            ARGS+=(--issue "${{ inputs.issue_number }}")
          fi
          if [ -n "${{ inputs.pr_number }}" ]; then
            ARGS+=(--pr "${{ inputs.pr_number }}")
          fi
          if [ -n "${{ inputs.comment_id }}" ]; then
            ARGS+=(--comment-id "${{ inputs.comment_id }}")
          fi
          if [ -n "${{ inputs.replacement_body }}" ]; then
            ARGS+=(--replacement-body "${{ inputs.replacement_body }}")
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS+=(--force)
          fi
          node scripts/rollback-run.mjs "${ARGS[@]}" > .artifacts/rollback/result.json
          cat .artifacts/rollback/result.json

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: rollback-${{ github.run_id }}
          path: .artifacts/rollback
