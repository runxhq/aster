name: skill-learning

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: skill-learning-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  skill-learning:
    if: ${{ startsWith(github.event.issue.title, '[skill]') }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RUNX_CALLER_MODEL: ${{ vars.RUNX_CALLER_MODEL || 'gpt-5.4' }}
      RUNX_CALLER_REASONING_EFFORT: ${{ vars.RUNX_CALLER_REASONING_EFFORT || 'xhigh' }}
      RUNX_CALLER_MAX_ATTEMPTS: ${{ vars.RUNX_CALLER_MAX_ATTEMPTS || '3' }}
    steps:
      - name: Check lane prerequisites
        id: preflight
        env:
          HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          if [ "${HAS_OPENAI_KEY}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY not configured; skipping skill-learning."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out automaton
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.RUNX_REPOSITORY || 'auscaster/runx' }}
          ref: ${{ vars.RUNX_REF || 'main' }}
          path: runx

      - name: Set up Node.js
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: corepack enable

      - name: Install and build runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          pnpm --dir runx install --no-frozen-lockfile
          pnpm --dir runx build

      - name: Configure git author
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run objective-to-skill
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p .artifacts/skill-learning
          node scripts/runx-agent-bridge.mjs \
            --runx-root "$GITHUB_WORKSPACE/runx" \
            --receipt-dir "$GITHUB_WORKSPACE/.artifacts/skill-learning/receipts" \
            --trace-dir "$GITHUB_WORKSPACE/.artifacts/skill-learning/provider-trace" \
            --output "$GITHUB_WORKSPACE/.artifacts/skill-learning/result.json" \
            -- \
            skill "$GITHUB_WORKSPACE/runx/skills/objective-to-skill" \
            --objective "$ISSUE_TITLE" \
            --project_context "$ISSUE_BODY"

      - name: Materialize proposal
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          node scripts/write-skill-proposal.mjs \
            --input ".artifacts/skill-learning/result.json" \
            --title "${{ github.event.issue.title }}" \
            --issue-url "${{ github.event.issue.html_url }}"

      - name: Validate repo after skill proposal
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: npm run docs:ci

      - name: Write PR body
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          cat > .artifacts/skill-learning/pr-body.md <<EOF
          ## Summary

          This draft PR was opened by the \`automaton\` skill-learning lane.

          - Source issue: #${{ github.event.issue.number }}
          - Issue URL: ${{ github.event.issue.html_url }}
          - Lane: \`objective-to-skill\`
          - Output: generated proposal under \`docs/skill-proposals/\`

          ## Validation

          - \`npm run check\`
          - \`npm run docs:build\`
          - receipts uploaded with this workflow run
          EOF

      - name: Publish draft PR
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          node scripts/publish-runx-pr.mjs \
            --repo "${{ github.repository }}" \
            --branch "runx/skill-${{ github.event.issue.number }}" \
            --title "[runx] skill proposal #${{ github.event.issue.number }}" \
            --commit-message "docs(skill): propose skill #${{ github.event.issue.number }}" \
            --body-file ".artifacts/skill-learning/pr-body.md" \
            --issue-number "${{ github.event.issue.number }}"

      - name: Upload artifacts
        if: ${{ always() && steps.preflight.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: skill-learning-${{ github.event.issue.number }}
          path: .artifacts/skill-learning
