name: skill-lab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types:
      - opened
      - edited
      - reopened
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to convert into a skill proposal explicitly.
        required: true
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: skill-lab-${{ github.event.issue.number || github.event.inputs.issue_number || github.ref_name }}
  cancel-in-progress: true

jobs:
  skill-lab:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.issue.title, '[skill]') }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ASTER_GH_TOKEN != '' && secrets.ASTER_GH_TOKEN || github.token }}
      RUNX_CALLER_MODEL: ${{ vars.RUNX_CALLER_MODEL || 'gpt-5.4' }}
      RUNX_CALLER_REASONING_EFFORT: ${{ vars.RUNX_CALLER_REASONING_EFFORT || 'xhigh' }}
      RUNX_CALLER_MAX_ATTEMPTS: ${{ vars.RUNX_CALLER_MAX_ATTEMPTS || '3' }}
    steps:
      - name: Check lane prerequisites
        id: preflight
        env:
          HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          if [ "${HAS_OPENAI_KEY}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY not configured; skipping skill-lab."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out aster
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check out runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.RUNX_REPOSITORY || 'nilstate/runx' }}
          ref: ${{ vars.RUNX_REF || 'main' }}
          path: .runx/runx
          token: ${{ secrets.RUNX_REPOSITORY_PAT || github.token }}

      - name: Set up Node.js
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable corepack
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: corepack enable

      - name: Install and build runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          pnpm --dir .runx/runx install --no-frozen-lockfile
          pnpm --dir .runx/runx build

      - name: Configure git author
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve issue envelope
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        id: issue
        env:
          EVENT_ISSUE_NUMBER: ${{ github.event.issue.number }}
          EVENT_ISSUE_TITLE: ${{ github.event.issue.title }}
          EVENT_ISSUE_BODY: ${{ github.event.issue.body }}
          EVENT_ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          mkdir -p .artifacts/skill-lab
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            gh issue view "${{ github.event.inputs.issue_number }}" \
              --repo "${{ github.repository }}" \
              --json number,title,body,url \
              > .artifacts/skill-lab/issue.json
          else
            jq -n \
              --arg number "$EVENT_ISSUE_NUMBER" \
              --arg title "$EVENT_ISSUE_TITLE" \
              --arg body "$EVENT_ISSUE_BODY" \
              --arg url "$EVENT_ISSUE_URL" \
              '{number: ($number | tonumber), title: $title, body: $body, url: $url}' \
              > .artifacts/skill-lab/issue.json
          fi
          echo "number=$(jq -r '.number' .artifacts/skill-lab/issue.json)" >> "$GITHUB_OUTPUT"
          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          jq -r '.title' .artifacts/skill-lab/issue.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          jq -r '.body // \"\"' .artifacts/skill-lab/issue.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "url=$(jq -r '.url' .artifacts/skill-lab/issue.json)" >> "$GITHUB_OUTPUT"

      - name: Run objective-to-skill
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
        run: |
          node scripts/aster-core.mjs \
            --lane skill-lab \
            --runx-root "$GITHUB_WORKSPACE/.runx/runx" \
            --artifact-root "$GITHUB_WORKSPACE/.artifacts/skill-lab" \
            --subject-kind github_issue \
            --subject-locator "${{ github.repository }}#issue/${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --target-repo "${{ github.repository }}" \
            --issue-number "${{ steps.issue.outputs.number }}" \
            --issue-url "${{ steps.issue.outputs.url }}" \
            --receipt-dir "$GITHUB_WORKSPACE/.artifacts/skill-lab/receipts" \
            --trace-dir "$GITHUB_WORKSPACE/.artifacts/skill-lab/provider-trace" \
            --output "$GITHUB_WORKSPACE/.artifacts/skill-lab/result.json" \
            -- \
            skill "$GITHUB_WORKSPACE/.runx/runx/skills/objective-to-skill" \
            --objective "$ISSUE_TITLE" \
            --project_context "$ISSUE_BODY"
          node scripts/apply-aster-promotions.mjs \
            --repo-root "$GITHUB_WORKSPACE" \
            --summary "$GITHUB_WORKSPACE/.artifacts/skill-lab/core-summary.json" \
            --output "$GITHUB_WORKSPACE/.artifacts/skill-lab/promotion-apply.json"

      - name: Materialize proposal
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          node scripts/write-skill-proposal.mjs \
            --input ".artifacts/skill-lab/result.json" \
            --title "${{ github.event.issue.title }}" \
            --issue-url "${{ github.event.issue.html_url }}"

      - name: Validate repo after skill proposal
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: npm run docs:ci

      - name: Record validation summary
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          jq -n '{commands:["npm run docs:ci"]}' > .artifacts/skill-lab/validation.json

      - name: Write PR body
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          cat > .artifacts/skill-lab/pr-body.md <<EOF
          ## Summary

          This draft PR was opened by the \`aster\` skill-lab lane.

          - Source issue: #${{ steps.issue.outputs.number }}
          - Issue URL: ${{ steps.issue.outputs.url }}
          - Lane: \`objective-to-skill\`
          - Output: generated proposal under \`docs/skill-proposals/\`

          ## Validation

          - \`npm run check\`
          - \`npm run docs:build\`
          - receipts uploaded with this workflow run
          EOF

      - name: Publish draft PR
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          node scripts/publish-runx-pr.mjs \
            --repo "${{ github.repository }}" \
            --branch "runx/skill-${{ steps.issue.outputs.number }}" \
            --title "[runx] skill proposal #${{ steps.issue.outputs.number }}" \
            --commit-message "docs(skill): propose skill #${{ steps.issue.outputs.number }}" \
            --body-file ".artifacts/skill-lab/pr-body.md" \
            --lane skill-lab \
            --issue-number "${{ steps.issue.outputs.number }}" \
            > .artifacts/skill-lab/publish.json
          cat .artifacts/skill-lab/publish.json

      - name: Evaluate generated PR
        if: ${{ steps.preflight.outputs.enabled == 'true' && hashFiles('.artifacts/skill-lab/publish.json') != '' }}
        run: |
          node scripts/evaluate-generated-pr.mjs \
            --publish ".artifacts/skill-lab/publish.json" \
            --body-file ".artifacts/skill-lab/pr-body.md" \
            --validation ".artifacts/skill-lab/validation.json" \
            --output ".artifacts/skill-lab/pr-eval.json"

      - name: Queue issue-triage on draft PR
        if: ${{ steps.preflight.outputs.enabled == 'true' && hashFiles('.artifacts/skill-lab/publish.json') != '' }}
        run: |
          if [ "$(jq -r '.status' .artifacts/skill-lab/publish.json)" != "published" ]; then
            exit 0
          fi
          gh workflow run issue-triage.yml \
            --repo "${{ github.repository }}" \
            -f pr_number="$(jq -r '.pr_number' .artifacts/skill-lab/publish.json)"

      - name: Publish evidence
        if: ${{ always() && steps.preflight.outputs.enabled == 'true' }}
        env:
          RUNX_PUBLIC_EVIDENCE_API_BASE_URL: ${{ vars.RUNX_PUBLIC_EVIDENCE_API_BASE_URL || 'https://api.runx.ai' }}
          RUNX_PUBLIC_EVIDENCE_TOKEN: ${{ secrets.RUNX_PUBLIC_EVIDENCE_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            TITLE="tested a skill in the lab"
            SUMMARY="ran skill-lab evaluation and recorded trust findings"
          else
            TITLE="skill-lab evaluation failed"
            SUMMARY="skill-lab lane failed during execution"
          fi
          curl --fail --silent --show-error \
            -X POST \
            -H "authorization: Bearer ${RUNX_PUBLIC_EVIDENCE_TOKEN}" \
            -H "content-type: application/json" \
            --data "$(jq -n \
              --arg title "$TITLE" --arg summary "$SUMMARY" --arg status "$STATUS" \
              --arg repo "${{ github.repository }}" --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{events: [{kind: "aster_run", source: "github-actions", status: (if $status == "success" then "success" else "failure" end), title: $title, summary: $summary, repo: $repo, workflow: "skill-lab", url: $url, timestamp: (now | todate), metadata: {lane: "skill-lab", feed_channel: "main", main_feed_eligible: true}}]}')" \
            "${RUNX_PUBLIC_EVIDENCE_API_BASE_URL%/}/v1/admin/public/evidence" || true

      - name: Upload artifacts
        if: ${{ always() && steps.preflight.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: skill-lab-${{ steps.issue.outputs.number || github.event.issue.number || github.event.inputs.issue_number }}
          path: .artifacts/skill-lab
