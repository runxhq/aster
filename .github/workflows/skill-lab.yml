name: skill-lab

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types:
      - opened
      - edited
      - reopened
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to convert into a skill proposal explicitly.
        required: true
        type: string

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: skill-lab-${{ github.event.issue.number || github.event.inputs.issue_number || github.ref_name }}
  cancel-in-progress: ${{ github.event_name != 'issue_comment' }}

jobs:
  skill-lab:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issues' &&
          startsWith(github.event.issue.title, '[skill]')
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request == null &&
          github.event.comment.user.type != 'Bot' &&
          contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
          !contains(github.event.comment.body, '<!-- aster:runx-skill-lab -->') &&
          !contains(github.event.comment.body, '<!-- aster:runx-issue-triage -->') &&
          !contains(github.event.comment.body, '<!-- aster:runx-work-lane:') &&
          startsWith(github.event.issue.title, '[skill]')
        )
      }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ASTER_GH_TOKEN != '' && secrets.ASTER_GH_TOKEN || github.token }}
      RUNX_CALLER_MODEL: ${{ vars.RUNX_CALLER_SKILL_LAB_MODEL || 'gpt-5.4' }}
      RUNX_CALLER_REASONING_EFFORT: ${{ vars.RUNX_CALLER_SKILL_LAB_REASONING_EFFORT || 'medium' }}
      RUNX_CALLER_MAX_ATTEMPTS: ${{ vars.RUNX_CALLER_SKILL_LAB_MAX_ATTEMPTS || '1' }}
      RUNX_CALLER_REQUEST_TIMEOUT_MS: ${{ vars.RUNX_CALLER_SKILL_LAB_REQUEST_TIMEOUT_MS || '420000' }}
    steps:
      - name: Check lane prerequisites
        id: preflight
        env:
          HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          if [ "${HAS_OPENAI_KEY}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY not configured; skipping skill-lab."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out aster
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check out runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.RUNX_REPOSITORY || 'nilstate/runx' }}
          ref: ${{ vars.RUNX_REF || 'main' }}
          path: .runx/runx
          token: ${{ secrets.RUNX_REPOSITORY_PAT || github.token }}

      - name: Set up Node.js
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable corepack
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: corepack enable

      - name: Install and build runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          pnpm --dir .runx/runx install --no-frozen-lockfile
          pnpm --dir .runx/runx build

      - name: Configure git author
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Resolve issue envelope
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        id: issue
        run: |
          mkdir -p .artifacts/skill-lab
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"
          else
            ISSUE_NUMBER="${{ github.event.issue.number }}"
          fi
          gh issue view "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --json number,title,body,url \
            > .artifacts/skill-lab/issue.json
          echo "number=$(jq -r '.number' .artifacts/skill-lab/issue.json)" >> "$GITHUB_OUTPUT"
          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          jq -r '.title' .artifacts/skill-lab/issue.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          jq -r '.body // ""' .artifacts/skill-lab/issue.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "url=$(jq -r '.url' .artifacts/skill-lab/issue.json)" >> "$GITHUB_OUTPUT"

      - name: Build issue ledger
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        id: issue_ledger
        run: |
          node scripts/issue-ledger.mjs \
            --repo "${{ github.repository }}" \
            --issue "${{ steps.issue.outputs.number }}" \
            --output ".artifacts/skill-lab/issue-ledger.json"
          echo "ledger_revision=$(jq -r '.ledger_revision' .artifacts/skill-lab/issue-ledger.json)" >> "$GITHUB_OUTPUT"
          TRUSTED_COMMENT_COUNT="$(jq -r '.amendment_summary.trusted_human_comment_count' .artifacts/skill-lab/issue-ledger.json)"
          if [ "$TRUSTED_COMMENT_COUNT" -gt 0 ]; then
            echo "Skill request ledger includes ${TRUSTED_COMMENT_COUNT} trusted human amendment comments." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Prepare skill-lab request
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        id: request
        run: |
          node scripts/prepare-skill-lab-input.mjs \
            --input ".artifacts/skill-lab/issue-ledger.json" \
            --catalog-file "$GITHUB_WORKSPACE/.runx/runx/packages/cli/src/official-skills.lock.json" \
            --output ".artifacts/skill-lab/request.json"
          jq -r '.objective // ""' .artifacts/skill-lab/request.json > .artifacts/skill-lab/objective.txt
          jq -r '.project_context // ""' .artifacts/skill-lab/request.json > .artifacts/skill-lab/project-context.txt
          echo "source_repo=$(jq -r '.source_issue.repo // ""' .artifacts/skill-lab/request.json)" >> "$GITHUB_OUTPUT"
          echo "ledger_revision=$(jq -r '.source_issue.ledger_revision // ""' .artifacts/skill-lab/request.json)" >> "$GITHUB_OUTPUT"
          echo "objective_present=$(jq -r 'if (.objective // "") != "" then "true" else "false" end' .artifacts/skill-lab/request.json)" >> "$GITHUB_OUTPUT"

      - name: Run design-skill
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        timeout-minutes: 30
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          ISSUE_OBJECTIVE="$(cat .artifacts/skill-lab/objective.txt)"
          ISSUE_CONTEXT="$(cat .artifacts/skill-lab/project-context.txt)"
          node scripts/aster-core.mjs \
            --lane skill-lab \
            --runx-root "$GITHUB_WORKSPACE/.runx/runx" \
            --artifact-root "$GITHUB_WORKSPACE/.artifacts/skill-lab" \
            --subject-kind github_issue \
            --subject-locator "${{ github.repository }}#issue/${{ steps.issue.outputs.number }}" \
            --repo "${{ github.repository }}" \
            --target-repo "${{ github.repository }}" \
            --issue-number "${{ steps.issue.outputs.number }}" \
            --issue-url "${{ steps.issue.outputs.url }}" \
            --snapshot "$GITHUB_WORKSPACE/.artifacts/skill-lab/issue-ledger.json" \
            --receipt-dir "$GITHUB_WORKSPACE/.artifacts/skill-lab/receipts" \
            --trace-dir "$GITHUB_WORKSPACE/.artifacts/skill-lab/provider-trace" \
            --max-history 1 \
            --max-reflections 1 \
            --max-artifacts 2 \
            --output "$GITHUB_WORKSPACE/.artifacts/skill-lab/result.json" \
            -- \
            skill "$GITHUB_WORKSPACE/.runx/runx/skills/design-skill" \
            --objective "$ISSUE_OBJECTIVE" \
            --project_context "$ISSUE_CONTEXT"

      - name: Materialize proposal
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          ISSUE_OBJECTIVE="$(cat .artifacts/skill-lab/objective.txt)"
          node scripts/write-skill-proposal.mjs \
            --input ".artifacts/skill-lab/result.json" \
            --title "$ISSUE_OBJECTIVE" \
            --issue-url "${{ steps.issue.outputs.url }}" \
            --issue-packet ".artifacts/skill-lab/request.json"

      - name: Evaluate proposal quality
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        id: proposal_quality
        run: |
          node scripts/evaluate-skill-proposal-quality.mjs \
            --result-json ".artifacts/skill-lab/result.json" \
            --issue-packet ".artifacts/skill-lab/request.json" \
            --catalog-file "$GITHUB_WORKSPACE/.runx/runx/packages/cli/src/official-skills.lock.json" \
            --output ".artifacts/skill-lab/proposal-quality.json"
          echo "status=$(jq -r '.status' .artifacts/skill-lab/proposal-quality.json)" >> "$GITHUB_OUTPUT"
          echo "score=$(jq -r '.score' .artifacts/skill-lab/proposal-quality.json)" >> "$GITHUB_OUTPUT"
          if [ "$(jq -r '.status' .artifacts/skill-lab/proposal-quality.json)" != "pass" ]; then
            echo "Skill proposal quality needs review before draft PR publication." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Validate repo after skill proposal
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: npm run docs:ci

      - name: Record validation summary
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          jq -n '{commands:["npm run docs:ci"]}' > .artifacts/skill-lab/validation.json

      - name: Check work issue authorization
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        id: gate
        run: |
          node scripts/check-thread-teaching-gate.mjs \
            --repo "${{ github.repository }}" \
            --issue "${{ steps.issue.outputs.number }}" \
            --target-repo "${{ github.repository }}" \
            --subject-locator "${{ github.repository }}#issue/${{ steps.issue.outputs.number }}" \
            --applies-to "skill-lab.publish" \
            --output .artifacts/skill-lab/thread-teaching-gate.json
          if jq -e '.allowed == true' .artifacts/skill-lab/thread-teaching-gate.json > /dev/null; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "Skill proposal refreshed without draft PR publication." >> "$GITHUB_STEP_SUMMARY"
            echo "Reply in the same work issue with a thread-teaching record that authorizes \`skill-lab.publish\` to refresh the draft PR." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Write PR body
        if: ${{ steps.preflight.outputs.enabled == 'true' && steps.proposal_quality.outputs.status == 'pass' }}
        run: |
          cat > .artifacts/skill-lab/pr-body.md <<EOF
          ## Summary

          This draft PR was refreshed by the \`aster\` skill-lab lane from one work issue ledger.

          - Work issue: \`${{ steps.request.outputs.source_repo || github.repository }}#${{ steps.issue.outputs.number }}\`
          - Work issue URL: ${{ steps.issue.outputs.url }}
          - Ledger revision: \`${{ steps.request.outputs.ledger_revision || steps.issue_ledger.outputs.ledger_revision }}\`
          - Lane: \`design-skill\`
          - Output: refreshed proposal under \`docs/skill-proposals/\`

          ## Validation

          - \`npm run docs:ci\`
          - receipts uploaded with this workflow run

          ## Publication

          - Draft PR refresh is allowed only when the same work issue authorizes \`skill-lab.publish\`
          EOF

      - name: Publish draft PR
        if: ${{ steps.preflight.outputs.enabled == 'true' && steps.gate.outputs.allowed == 'true' && steps.proposal_quality.outputs.status == 'pass' }}
        run: |
          node scripts/publish-runx-pr.mjs \
            --repo "${{ github.repository }}" \
            --branch "runx/skill-${{ steps.issue.outputs.number }}" \
            --title "[runx] skill proposal #${{ steps.issue.outputs.number }}" \
            --commit-message "docs(skill): propose skill #${{ steps.issue.outputs.number }}" \
            --body-file ".artifacts/skill-lab/pr-body.md" \
            --reset-from-base \
            --force-with-lease \
            --lane skill-lab \
            > .artifacts/skill-lab/publish.json
          cat .artifacts/skill-lab/publish.json

      - name: Mark proposal-only run
        if: ${{ steps.preflight.outputs.enabled == 'true' && (steps.gate.outputs.allowed != 'true' || steps.proposal_quality.outputs.status != 'pass') }}
        run: |
          if [ "${{ steps.proposal_quality.outputs.status }}" != "pass" ]; then
            jq -n --arg score "${{ steps.proposal_quality.outputs.score }}" '{
              status: "not_requested",
              reason: "skill proposal quality needs review before publication",
              quality_score: ($score | tonumber?)
            }' > .artifacts/skill-lab/publish.json
          else
            jq -n '{
              status: "not_requested",
              reason: "skill-lab.publish gate not granted yet"
            }' > .artifacts/skill-lab/publish.json
          fi

      - name: Evaluate generated PR
        if: ${{ steps.preflight.outputs.enabled == 'true' && steps.gate.outputs.allowed == 'true' && steps.proposal_quality.outputs.status == 'pass' && hashFiles('.artifacts/skill-lab/publish.json') != '' }}
        run: |
          node scripts/evaluate-generated-pr.mjs \
            --publish ".artifacts/skill-lab/publish.json" \
            --body-file ".artifacts/skill-lab/pr-body.md" \
            --validation ".artifacts/skill-lab/validation.json" \
            --output ".artifacts/skill-lab/pr-eval.json"

      - name: Queue issue-triage on draft PR
        if: ${{ steps.preflight.outputs.enabled == 'true' && steps.gate.outputs.allowed == 'true' && steps.proposal_quality.outputs.status == 'pass' && hashFiles('.artifacts/skill-lab/publish.json') != '' }}
        run: |
          if [ "$(jq -r '.status' .artifacts/skill-lab/publish.json)" != "published" ]; then
            exit 0
          fi
          gh workflow run issue-triage.yml \
            --repo "${{ github.repository }}" \
            -f pr_number="$(jq -r '.pr_number' .artifacts/skill-lab/publish.json)"

      - name: Post skill-lab issue update
        if: ${{ always() && steps.preflight.outputs.enabled == 'true' && steps.request.outputs.objective_present == 'true' }}
        run: |
          set -euo pipefail
          ISSUE_OBJECTIVE="$(cat .artifacts/skill-lab/objective.txt)"
          args=(
            --repo "${{ github.repository }}"
            --issue "${{ steps.issue.outputs.number }}"
            --objective "$ISSUE_OBJECTIVE"
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            --workflow-status "${{ job.status }}"
          )
          if [ -f ".artifacts/skill-lab/result.json" ]; then
            args+=(--result-json ".artifacts/skill-lab/result.json")
          fi
          if [ -f ".artifacts/skill-lab/publish.json" ]; then
            args+=(--publish-json ".artifacts/skill-lab/publish.json")
          fi
          if [ -f ".artifacts/skill-lab/proposal-quality.json" ]; then
            args+=(--quality-json ".artifacts/skill-lab/proposal-quality.json")
          fi
          if [ -n "${{ steps.issue_ledger.outputs.ledger_revision }}" ]; then
            args+=(--ledger-revision "${{ steps.issue_ledger.outputs.ledger_revision }}")
          fi
          node scripts/post-skill-lab-comment.mjs "${args[@]}"

      - name: Publish evidence
        if: ${{ always() && steps.preflight.outputs.enabled == 'true' }}
        env:
          RUNX_PUBLIC_EVIDENCE_API_BASE_URL: ${{ vars.RUNX_PUBLIC_EVIDENCE_API_BASE_URL || 'https://api.runx.ai' }}
          RUNX_PUBLIC_EVIDENCE_TOKEN: ${{ secrets.RUNX_PUBLIC_EVIDENCE_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ] && [ "${{ steps.gate.outputs.allowed }}" = "true" ] && [ "${{ steps.proposal_quality.outputs.status }}" = "pass" ]; then
            TITLE="refreshed a skill proposal draft PR"
            SUMMARY="ran skill-lab from the work ledger and refreshed the rolling draft PR"
          elif [ "$STATUS" = "success" ] && [ "${{ steps.proposal_quality.outputs.status }}" != "pass" ]; then
            TITLE="refreshed a skill proposal"
            SUMMARY="ran skill-lab from the work ledger but held draft PR publication because proposal quality needs review"
          elif [ "$STATUS" = "success" ]; then
            TITLE="refreshed a skill proposal"
            SUMMARY="ran skill-lab from the work ledger without opening a draft PR"
          else
            TITLE="skill-lab evaluation failed"
            SUMMARY="skill-lab lane failed during execution"
          fi
          curl --fail --silent --show-error \
            -X POST \
            -H "authorization: Bearer ${RUNX_PUBLIC_EVIDENCE_TOKEN}" \
            -H "content-type: application/json" \
            --data "$(jq -n \
              --arg title "$TITLE" --arg summary "$SUMMARY" --arg status "$STATUS" \
              --arg repo "${{ github.repository }}" --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{events: [{kind: "aster_run", source: "github-actions", status: (if $status == "success" then "success" else "failure" end), title: $title, summary: $summary, repo: $repo, workflow: "skill-lab", url: $url, timestamp: (now | todate), metadata: {lane: "skill-lab", feed_channel: "main", main_feed_eligible: true}}]}')" \
            "${RUNX_PUBLIC_EVIDENCE_API_BASE_URL%/}/v1/admin/public/evidence" || true

      - name: Upload artifacts
        if: ${{ always() && steps.preflight.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: skill-lab-${{ steps.issue.outputs.number || github.event.issue.number || github.event.inputs.issue_number }}
          path: .artifacts/skill-lab
