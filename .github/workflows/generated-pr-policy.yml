name: generated-pr-policy

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request_target:
    types:
      - opened
      - edited
      - reopened
      - ready_for_review
      - synchronize
  workflow_dispatch:
    inputs:
      target_repo:
        description: Repo containing the pull request. Defaults to this repo.
        required: false
        type: string
      pr_number:
        description: Pull request number to enforce explicitly.
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: generated-pr-policy-${{ github.event.inputs.target_repo || github.repository }}-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  generated-pr-policy:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.event.pull_request.head.ref, 'runx/') }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ASTER_GH_TOKEN != '' && secrets.ASTER_GH_TOKEN || github.token }}
    steps:
      - name: Check out aster
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enforce generated PR policy
        run: |
          mkdir -p .artifacts/generated-pr-policy
          TARGET_REPO="${{ github.event.inputs.target_repo || github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number || github.event.inputs.pr_number }}"
          node scripts/enforce-generated-pr-policy.mjs \
            --repo "$TARGET_REPO" \
            --pr "$PR_NUMBER" \
            > .artifacts/generated-pr-policy/result.json
          cat .artifacts/generated-pr-policy/result.json

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: generated-pr-policy-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
          path: .artifacts/generated-pr-policy
