name: ci

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check out runx
        uses: actions/checkout@v6
        with:
          repository: nilstate/runx-platform
          path: runx
          token: ${{ secrets.ASTER_GH_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build shared runx tokens
        run: |
          npm --prefix runx/packages/tokens install
          npm --prefix runx/packages/tokens run build

      - name: Run repo checks
        run: npm run check

      - name: Install site dependencies
        run: npm --prefix site install

      - name: Check aster site
        run: npm run site:check

      - name: Build aster site
        run: npm run site:build
