name: thread-teaching-derive

on:
  schedule:
    - cron: "23 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  derive-thread-teaching:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ASTER_GH_TOKEN != '' && secrets.ASTER_GH_TOKEN || github.token }}
    steps:
      - name: Check out aster
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Derive thread teaching
        run: |
          mkdir -p .artifacts/thread-teaching-derive
          node scripts/derive-thread-teaching.mjs \
            --repo-root "$GITHUB_WORKSPACE" \
            --output "$GITHUB_WORKSPACE/state/thread-teaching.json"
          cp "$GITHUB_WORKSPACE/state/thread-teaching.json" "$GITHUB_WORKSPACE/.artifacts/thread-teaching-derive/thread-teaching.json"
          jq -r '"Derived " + ((.records | length) | tostring) + " thread-teaching records and " + ((.teaching_rows | length) | tostring) + " teaching rows."' "$GITHUB_WORKSPACE/state/thread-teaching.json" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish draft PR when thread teaching changes
        run: |
          cat > "$GITHUB_WORKSPACE/.artifacts/thread-teaching-derive/pr-body.md" <<'EOF'
          ## Summary

          This draft PR refreshes `state/thread-teaching.json` from trusted GitHub issue and PR teaching records.

          - source evidence stays in the underlying issue and PR threads
          - the state file is a rebuildable cache for runtime context and training
          - merge remains human-reviewed
          EOF
          node scripts/publish-runx-pr.mjs \
            --repo "${{ github.repository }}" \
            --branch "runx/thread-teaching-derive-${{ github.run_id }}" \
            --title "[runx] refresh thread teaching" \
            --commit-message "state(thread-teaching): refresh derived thread teaching" \
            --body-file "$GITHUB_WORKSPACE/.artifacts/thread-teaching-derive/pr-body.md" \
            --lane thread-teaching-derive \
            > "$GITHUB_WORKSPACE/.artifacts/thread-teaching-derive/publish.json"
          cat "$GITHUB_WORKSPACE/.artifacts/thread-teaching-derive/publish.json" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: thread-teaching-derive-${{ github.run_id }}
          path: .artifacts/thread-teaching-derive
