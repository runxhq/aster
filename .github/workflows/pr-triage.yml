name: pr-triage

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-triage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-triage:
    runs-on: ubuntu-latest
    env:
      RUNX_CALLER_MODEL: ${{ vars.RUNX_CALLER_MODEL || 'gpt-4o-2024-08-06' }}
    steps:
      - name: Check lane prerequisites
        id: preflight
        env:
          HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          if [ "${HAS_OPENAI_KEY}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY not configured; skipping pr-triage."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out automaton
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v4

      - name: Check out runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.RUNX_REPOSITORY || 'auscaster/runx' }}
          ref: ${{ vars.RUNX_REF || 'main' }}
          path: runx

      - name: Set up Node.js
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: corepack enable

      - name: Install and build runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          pnpm --dir runx install --no-frozen-lockfile
          pnpm --dir runx build

      - name: Build PR snapshot
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          mkdir -p .artifacts/pr-triage
          node scripts/build-pr-snapshot.mjs \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            > .artifacts/pr-triage/pr-snapshot.json

      - name: Run github-triage on PR snapshot
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node scripts/runx-agent-bridge.mjs \
            --runx-root "$GITHUB_WORKSPACE/runx" \
            --receipt-dir "$GITHUB_WORKSPACE/.artifacts/pr-triage/receipts" \
            --trace-dir "$GITHUB_WORKSPACE/.artifacts/pr-triage/provider-trace" \
            --output "$GITHUB_WORKSPACE/.artifacts/pr-triage/result.json" \
            -- \
            skill "$GITHUB_WORKSPACE/runx/skills/github-triage" \
            --runner respond \
            --objective "Draft the next high-signal maintainer comment for this pull request" \
            --issue_snapshot "$(cat "$GITHUB_WORKSPACE/.artifacts/pr-triage/pr-snapshot.json")" \
            --maintainer_context "Comment as the automaton operator. Focus on scope drift, missing validation, scafld governance, and the clearest next unblock. This is a pull request thread, not a user support issue."

      - name: Materialize PR comment
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          node scripts/write-triage-comment.mjs \
            --input ".artifacts/pr-triage/result.json" \
            --output ".artifacts/pr-triage/comment.md"

      - name: Post PR comment
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          node scripts/post-pr-triage-comment.mjs \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --body-file ".artifacts/pr-triage/comment.md" \
            --sha "${{ github.event.pull_request.head.sha }}"

      - name: Upload artifacts
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-triage-${{ github.event.pull_request.number }}
          path: .artifacts/pr-triage
