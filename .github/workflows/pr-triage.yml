name: pr-triage

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to triage explicitly.
        required: true
        type: string

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-triage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-triage:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RUNX_CALLER_MODEL: ${{ vars.RUNX_CALLER_MODEL || 'gpt-5.4' }}
      RUNX_CALLER_REASONING_EFFORT: ${{ vars.RUNX_CALLER_REASONING_EFFORT || 'xhigh' }}
      RUNX_CALLER_MAX_ATTEMPTS: ${{ vars.RUNX_CALLER_MAX_ATTEMPTS || '3' }}
    steps:
      - name: Check lane prerequisites
        id: preflight
        env:
          HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          if [ "${HAS_OPENAI_KEY}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY not configured; skipping pr-triage."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out automaton
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v6

      - name: Check out runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.RUNX_REPOSITORY || 'nilstate/runx' }}
          ref: ${{ vars.RUNX_REF || 'main' }}
          path: .runx/runx
          token: ${{ secrets.RUNX_REPOSITORY_PAT != '' && secrets.RUNX_REPOSITORY_PAT || secrets.RUNX_WORKSPACE_PAT != '' && secrets.RUNX_WORKSPACE_PAT || github.token }}

      - name: Materialize runx OSS submodule
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        env:
          RUNX_REPOSITORY_TOKEN: ${{ secrets.RUNX_REPOSITORY_PAT != '' && secrets.RUNX_REPOSITORY_PAT || secrets.RUNX_WORKSPACE_PAT != '' && secrets.RUNX_WORKSPACE_PAT || github.token }}
        run: |
          git -C .runx/runx config -f .gitmodules submodule.oss.url "https://x-access-token:${RUNX_REPOSITORY_TOKEN}@github.com/auscaster/runx.git"
          git -C .runx/runx submodule sync -- oss
          git -C .runx/runx submodule update --init --depth 1 oss

      - name: Set up Node.js
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable corepack
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: corepack enable

      - name: Install and build runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          pnpm --dir .runx/runx/oss install --no-frozen-lockfile
          pnpm --dir .runx/runx/oss build

      - name: Build PR snapshot
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          mkdir -p .artifacts/pr-triage
          node scripts/build-pr-snapshot.mjs \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.inputs.pr_number || github.event.pull_request.number }}" \
            > .artifacts/pr-triage/pr-snapshot.json

      - name: Run github-triage on PR snapshot
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          node scripts/runx-agent-bridge.mjs \
            --runx-root "$GITHUB_WORKSPACE/.runx/runx" \
            --receipt-dir "$GITHUB_WORKSPACE/.artifacts/pr-triage/receipts" \
            --trace-dir "$GITHUB_WORKSPACE/.artifacts/pr-triage/provider-trace" \
            --output "$GITHUB_WORKSPACE/.artifacts/pr-triage/result.json" \
            -- \
            skill "$GITHUB_WORKSPACE/.runx/runx/skills/github-triage" \
            --runner respond \
            --objective "Draft the next high-signal maintainer comment for this pull request" \
            --issue_snapshot "$(cat "$GITHUB_WORKSPACE/.artifacts/pr-triage/pr-snapshot.json")" \
            --maintainer_context "Comment as the automaton operator. Focus on scope drift, missing validation, scafld governance, and the clearest next unblock. This is a pull request thread, not a user support issue."

      - name: Materialize PR comment
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          node scripts/write-triage-comment.mjs \
            --input ".artifacts/pr-triage/result.json" \
            --output ".artifacts/pr-triage/comment.md"

      - name: Post PR comment
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          node scripts/post-pr-triage-comment.mjs \
            --repo "${{ github.repository }}" \
            --pr "$(jq -r '.pr_number' .artifacts/pr-triage/pr-snapshot.json)" \
            --body-file ".artifacts/pr-triage/comment.md" \
            --sha "$(jq -r '.head_sha' .artifacts/pr-triage/pr-snapshot.json)"

      - name: Upload artifacts
        if: ${{ always() && steps.preflight.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pr-triage-${{ github.event.pull_request.number }}
          path: .artifacts/pr-triage
