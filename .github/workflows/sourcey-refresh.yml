name: sourcey-refresh

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "43 3 * * *"

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: sourcey-refresh
  cancel-in-progress: false

jobs:
  sourcey-refresh:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RUNX_CALLER_MODEL: ${{ vars.RUNX_CALLER_MODEL || 'gpt-5.4' }}
      RUNX_CALLER_REASONING_EFFORT: ${{ vars.RUNX_CALLER_REASONING_EFFORT || 'xhigh' }}
      RUNX_CALLER_MAX_ATTEMPTS: ${{ vars.RUNX_CALLER_MAX_ATTEMPTS || '3' }}
    steps:
      - name: Check lane prerequisites
        id: preflight
        env:
          HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          if [ "${HAS_OPENAI_KEY}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY not configured; skipping sourcey-refresh."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out automaton
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check out runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.RUNX_REPOSITORY || 'nilstate/runx' }}
          ref: ${{ vars.RUNX_REF || 'main' }}
          path: .runx/runx
          token: ${{ secrets.RUNX_REPOSITORY_PAT != '' && secrets.RUNX_REPOSITORY_PAT || secrets.RUNX_WORKSPACE_PAT != '' && secrets.RUNX_WORKSPACE_PAT || github.token }}

      - name: Materialize runx OSS submodule
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        env:
          RUNX_REPOSITORY_TOKEN: ${{ secrets.RUNX_REPOSITORY_PAT != '' && secrets.RUNX_REPOSITORY_PAT || secrets.RUNX_WORKSPACE_PAT != '' && secrets.RUNX_WORKSPACE_PAT || github.token }}
        run: |
          git -C .runx/runx config -f .gitmodules submodule.oss.url "https://x-access-token:${RUNX_REPOSITORY_TOKEN}@github.com/auscaster/runx.git"
          git -C .runx/runx submodule sync -- oss
          git -C .runx/runx submodule update --init --depth 1 oss

      - name: Set up Node.js
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable corepack
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: corepack enable

      - name: Install and build runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          pnpm --dir .runx/runx/oss install --no-frozen-lockfile
          pnpm --dir .runx/runx/oss build

      - name: Configure git author
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run sourcey through runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          mkdir -p .artifacts/sourcey-refresh
          node scripts/runx-agent-bridge.mjs \
            --runx-root "$GITHUB_WORKSPACE/.runx/runx" \
            --receipt-dir "$GITHUB_WORKSPACE/.artifacts/sourcey-refresh/receipts" \
            --trace-dir "$GITHUB_WORKSPACE/.artifacts/sourcey-refresh/provider-trace" \
            --output "$GITHUB_WORKSPACE/.artifacts/sourcey-refresh/result.json" \
            --approve sourcey.discovery.approval \
            -- \
            skill "$GITHUB_WORKSPACE/.runx/runx/skills/sourcey" \
            --project "$GITHUB_WORKSPACE" \
            --brand_name "automaton" \
            --homepage_url "https://github.com/auscaster/automaton" \
            --docs_inputs '{"mode":"config","config":"docs/sourcey.config.ts"}' \
            --output_dir "$GITHUB_WORKSPACE/.sourcey/runx-docs" \
            --sourcey_bin "$GITHUB_WORKSPACE/scripts/sourcey-wrapper.sh"

      - name: Validate repo after sourcey refresh
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: npm run docs:ci

      - name: Write PR body
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          cat > .artifacts/sourcey-refresh/pr-body.md <<'EOF'
          ## Summary

          This draft PR was opened by the `automaton` Sourcey refresh lane.

          - Lane: `runx sourcey`
          - Scope: bounded docs/config refresh for this repository
          - Receipts: uploaded as workflow artifacts for this run

          ## Validation

          - `npm run check`
          - `npm run docs:build`
          - `runx` receipts captured in `.artifacts/sourcey-refresh`
          EOF

      - name: Publish draft PR
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          node scripts/publish-runx-pr.mjs \
            --repo "${{ github.repository }}" \
            --branch "runx/sourcey-refresh" \
            --title "[runx] refresh Sourcey docs" \
            --commit-message "docs(sourcey): refresh docs source" \
            --close-existing-if-noop \
            --body-file ".artifacts/sourcey-refresh/pr-body.md" \
            > .artifacts/sourcey-refresh/publish.json
          cat .artifacts/sourcey-refresh/publish.json

      - name: Queue PR triage
        if: ${{ steps.preflight.outputs.enabled == 'true' && hashFiles('.artifacts/sourcey-refresh/publish.json') != '' }}
        run: |
          if [ "$(jq -r '.status' .artifacts/sourcey-refresh/publish.json)" != "published" ]; then
            exit 0
          fi
          gh workflow run pr-triage.yml \
            --repo "${{ github.repository }}" \
            -f pr_number="$(jq -r '.pr_number' .artifacts/sourcey-refresh/publish.json)"

      - name: Upload artifacts
        if: ${{ always() && steps.preflight.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: sourcey-refresh
          path: .artifacts/sourcey-refresh
