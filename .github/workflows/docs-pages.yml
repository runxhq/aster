name: docs-pages

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - doctrine/**
      - state/**
      - history/**
      - reflections/**
      - site/**
      - docs/**
      - package.json
      - .github/workflows/docs-pages.yml

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check out runx
        uses: actions/checkout@v6
        with:
          repository: nilstate/runx
          path: runx

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install site dependencies
        run: npm --prefix site install

      - name: Check automaton site
        run: npm run site:check

      - name: Build Sourcey docs
        run: npm run docs:build

      - name: Build automaton site
        run: npm run site:build

      - name: Configure Pages
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
