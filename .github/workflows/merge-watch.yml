name: merge-watch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: External repo with an upstream SKILL.md contribution PR
        required: true
        type: string
      pr_number:
        description: Contribution PR number
        required: true
        type: string
      candidate_path:
        description: Portable skill file path in the target repo
        required: true
        default: SKILL.md
        type: string
      registry_owner:
        description: runx registry owner namespace to request after merge
        required: true
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: merge-watch-${{ inputs.target_repo }}-${{ inputs.pr_number }}
  cancel-in-progress: false

jobs:
  merge-watch:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.UPSTREAM_CONTRIBUTION_TOKEN || secrets.RUNX_REPOSITORY_PAT || github.token }}
      TARGET_REPO: ${{ inputs.target_repo }}
      PR_NUMBER: ${{ inputs.pr_number }}
      CANDIDATE_PATH: ${{ inputs.candidate_path }}
      REGISTRY_OWNER: ${{ inputs.registry_owner }}
    steps:
      - name: Check out aster
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Observe upstream PR state
        run: |
          set -euo pipefail
          mkdir -p .artifacts/merge-watch
          node scripts/merge-watch.mjs \
            --repo "$TARGET_REPO" \
            --pr "$PR_NUMBER" \
            --candidate-path "$CANDIDATE_PATH" \
            --registry-owner "$REGISTRY_OWNER" \
            --artifacts-dir .artifacts/merge-watch \
            > .artifacts/merge-watch.summary.json
          cat .artifacts/merge-watch.summary.json

      - name: Publish enriched watch evidence
        if: ${{ always() }}
        env:
          RUNX_PUBLIC_EVIDENCE_API_BASE_URL: ${{ vars.RUNX_PUBLIC_EVIDENCE_API_BASE_URL || 'https://api.runx.ai' }}
          RUNX_PUBLIC_EVIDENCE_TOKEN: ${{ secrets.RUNX_PUBLIC_EVIDENCE_TOKEN }}
        run: |
          set -euo pipefail
          if [ ! -s .artifacts/merge-watch/public_feed_event.json ]; then
            echo "no public_feed_event.json generated"
            exit 0
          fi
          if [ -z "${RUNX_PUBLIC_EVIDENCE_TOKEN:-}" ]; then
            echo "RUNX_PUBLIC_EVIDENCE_TOKEN not configured; skipping enriched evidence publish"
            exit 0
          fi
          python3 - <<'PY' > "$RUNNER_TEMP/merge-watch-evidence.json"
          import json
          import os
          from datetime import datetime, timezone

          with open(".artifacts/merge-watch/public_feed_event.json", "r", encoding="utf-8") as handle:
              feed = json.load(handle)

          metadata = dict(feed.get("metadata") or {})
          run_url = f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          event = {
              "kind": "aster_run",
              "source": "github-actions",
              "status": feed.get("status") or "success",
              "title": f"watched upstream merge on {metadata.get('target_repo') or os.environ.get('TARGET_REPO')}",
              "timestamp": feed.get("timestamp") or datetime.now(timezone.utc).isoformat().replace("+00:00", "Z"),
              "summary": feed.get("summary"),
              "repo": os.environ.get("GITHUB_REPOSITORY"),
              "workflow": os.environ.get("GITHUB_WORKFLOW"),
              "branch": os.environ.get("GITHUB_REF_NAME"),
              "commit": os.environ.get("GITHUB_SHA"),
              "run_id": os.environ.get("GITHUB_RUN_ID"),
              "url": run_url,
              "skill_id": metadata.get("skill_id"),
              "metadata": metadata | {
                  "artifact_url": f"{run_url}#artifacts",
                  "github_run_id": os.environ.get("GITHUB_RUN_ID"),
                  "github_run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT"),
              },
          }
          print(json.dumps({"events": [event]}))
          PY
          curl --fail --silent --show-error \
            -X POST \
            -H "authorization: Bearer ${RUNX_PUBLIC_EVIDENCE_TOKEN}" \
            -H "content-type: application/json" \
            --data @"$RUNNER_TEMP/merge-watch-evidence.json" \
            "${RUNX_PUBLIC_EVIDENCE_API_BASE_URL%/}/v1/admin/public/evidence"

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: merge-watch-${{ github.run_id }}
          path: |
            .artifacts/merge-watch
            .artifacts/merge-watch.summary.json
