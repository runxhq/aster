name: skill-upstream

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  issues:
    types:
      - opened
      - edited
      - reopened
  issue_comment:
    types:
      - created
  workflow_dispatch:
    inputs:
      issue_number:
        description: Work issue number in this repo. The issue is the living ledger for this upstream contribution.
        required: true
        type: string

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: skill-upstream-${{ github.event.issue.number || github.event.inputs.issue_number || github.ref_name }}
  cancel-in-progress: ${{ github.event_name != 'issue_comment' }}

jobs:
  skill-upstream:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issues' &&
          startsWith(github.event.issue.title, '[upstream]')
        ) ||
        (
          github.event_name == 'issue_comment' &&
          github.event.issue.pull_request == null &&
          github.event.comment.user.type != 'Bot' &&
          contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
          !contains(github.event.comment.body, '<!-- aster:runx-skill-lab -->') &&
          !contains(github.event.comment.body, '<!-- aster:runx-issue-triage -->') &&
          !contains(github.event.comment.body, '<!-- aster:runx-work-lane:') &&
          startsWith(github.event.issue.title, '[upstream]')
        )
      }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.UPSTREAM_CONTRIBUTION_TOKEN || secrets.RUNX_REPOSITORY_PAT || github.token }}
    steps:
      - name: Check out aster
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve issue envelope
        id: issue
        run: |
          mkdir -p .artifacts/skill-upstream
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ISSUE_NUMBER="${{ github.event.inputs.issue_number }}"
          else
            ISSUE_NUMBER="${{ github.event.issue.number }}"
          fi
          gh issue view "$ISSUE_NUMBER" \
            --repo "${{ github.repository }}" \
            --json number,title,body,url \
            > .artifacts/skill-upstream/issue.json
          echo "number=$(jq -r '.number' .artifacts/skill-upstream/issue.json)" >> "$GITHUB_OUTPUT"
          echo "title<<EOF" >> "$GITHUB_OUTPUT"
          jq -r '.title' .artifacts/skill-upstream/issue.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          jq -r '.body // ""' .artifacts/skill-upstream/issue.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "url=$(jq -r '.url' .artifacts/skill-upstream/issue.json)" >> "$GITHUB_OUTPUT"

      - name: Build issue ledger
        id: issue_ledger
        run: |
          node scripts/issue-ledger.mjs \
            --repo "${{ github.repository }}" \
            --issue "${{ steps.issue.outputs.number }}" \
            --output .artifacts/skill-upstream/issue-ledger.json
          echo "ledger_revision=$(jq -r '.ledger_revision' .artifacts/skill-upstream/issue-ledger.json)" >> "$GITHUB_OUTPUT"

      - name: Prepare work issue request
        id: request
        run: |
          node scripts/prepare-work-issue-request.mjs \
            --input .artifacts/skill-upstream/issue-ledger.json \
            --lane skill-upstream \
            --default-source-repo "${{ github.repository }}" \
            --output .artifacts/skill-upstream/work-issue-request.json
          jq -e '.target_repo != null' .artifacts/skill-upstream/work-issue-request.json > /dev/null
          echo "request_title=$(jq -r '.request_title' .artifacts/skill-upstream/work-issue-request.json)" >> "$GITHUB_OUTPUT"
          echo "target_repo=$(jq -r '.target_repo' .artifacts/skill-upstream/work-issue-request.json)" >> "$GITHUB_OUTPUT"
          echo "target_ref=$(jq -r '.target_ref' .artifacts/skill-upstream/work-issue-request.json)" >> "$GITHUB_OUTPUT"
          echo "workflow=$(jq -r '.workflow' .artifacts/skill-upstream/work-issue-request.json)" >> "$GITHUB_OUTPUT"
          echo "mode=$(jq -r '.mode' .artifacts/skill-upstream/work-issue-request.json)" >> "$GITHUB_OUTPUT"
          echo "candidate_path=$(jq -r '.candidate_path' .artifacts/skill-upstream/work-issue-request.json)" >> "$GITHUB_OUTPUT"
          echo "force=$(jq -r '.force' .artifacts/skill-upstream/work-issue-request.json)" >> "$GITHUB_OUTPUT"
          echo "issue_url=$(jq -r '.source_issue.url // ""' .artifacts/skill-upstream/work-issue-request.json)" >> "$GITHUB_OUTPUT"

      - name: Check out target repo
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.request.outputs.target_repo }}
          ref: ${{ steps.request.outputs.target_ref }}
          token: ${{ secrets.UPSTREAM_CONTRIBUTION_TOKEN || secrets.RUNX_REPOSITORY_PAT || github.token }}
          path: .target/repo
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure target git author
        run: |
          git -C .target/repo config user.name "auscaster"
          git -C .target/repo config user.email "100876+auscaster@users.noreply.github.com"

      - name: Prepare portable skill upstream packet
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          args=(
            --target-repo-dir .target/repo
            --target-repo "${{ steps.request.outputs.target_repo }}"
            --output-dir .artifacts/skill-upstream
            --workflow "${{ steps.request.outputs.workflow }}"
            --mode "${{ steps.request.outputs.mode }}"
            --candidate-path "${{ steps.request.outputs.candidate_path }}"
            --branch "runx/add-skill-md"
            --work-issue-repo "${{ github.repository }}"
            --work-issue-number "${{ steps.issue.outputs.number }}"
          )
          if [ -n "${{ steps.request.outputs.issue_url }}" ]; then
            args+=(--work-issue-url "${{ steps.request.outputs.issue_url }}")
          fi
          if [ -n "${{ steps.issue_ledger.outputs.ledger_revision }}" ]; then
            args+=(--ledger-revision "${{ steps.issue_ledger.outputs.ledger_revision }}")
          fi
          if [ "${{ steps.request.outputs.force }}" = "true" ]; then
            args+=(--force)
          fi
          node scripts/prepare-skill-upstream.mjs "${args[@]}" \
            > .artifacts/skill-upstream.prepare.json
          cat .artifacts/skill-upstream.prepare.json

      - name: Validate portable skill upstream packet
        run: |
          node scripts/validate-skill-upstream.mjs \
            --target-repo-dir .target/repo \
            --artifacts-dir .artifacts/skill-upstream \
            > .artifacts/skill-upstream.validate.json
          cat .artifacts/skill-upstream.validate.json

      - name: Check work issue authorization
        id: gate
        run: |
          node scripts/check-thread-teaching-gate.mjs \
            --repo "${{ github.repository }}" \
            --issue "${{ steps.issue.outputs.number }}" \
            --target-repo "${{ steps.request.outputs.target_repo }}" \
            --subject-locator "${{ steps.request.outputs.target_repo }}" \
            --applies-to "skill-upstream.publish" \
            --output .artifacts/skill-upstream/thread-teaching-gate.json
          if jq -e '.allowed == true' .artifacts/skill-upstream/thread-teaching-gate.json > /dev/null; then
            echo "allowed=true" >> "$GITHUB_OUTPUT"
          else
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            echo "Upstream proposal refreshed without draft PR publication." >> "$GITHUB_STEP_SUMMARY"
            echo "Reply in the same work issue with trusted \`Applies To:\` + \`Decision:\` lines, or a full thread-teaching record, that authorizes \`skill-upstream.publish\` to refresh the draft PR." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish draft PR
        if: ${{ steps.gate.outputs.allowed == 'true' }}
        run: |
          set -euo pipefail
          cd .target/repo
          node "$GITHUB_WORKSPACE/scripts/publish-runx-pr.mjs" \
            --repo "${{ steps.request.outputs.target_repo }}" \
            --branch "runx/add-skill-md" \
            --title "Add portable SKILL.md" \
            --commit-message "docs: add portable SKILL.md" \
            --body-file "$GITHUB_WORKSPACE/.artifacts/skill-upstream/pr-body.md" \
            --lane skill-upstream \
            > "$GITHUB_WORKSPACE/.artifacts/skill-upstream/publish.json"
          cat "$GITHUB_WORKSPACE/.artifacts/skill-upstream/publish.json"

      - name: Mark proposal-only run
        if: ${{ steps.gate.outputs.allowed != 'true' }}
        run: |
          jq -n '{
            status: "not_requested",
            reason: "publish gate not granted yet"
          }' > .artifacts/skill-upstream/publish.json

      - name: Evaluate generated PR
        if: ${{ steps.gate.outputs.allowed == 'true' && hashFiles('.artifacts/skill-upstream/publish.json') != '' }}
        run: |
          node scripts/evaluate-generated-pr.mjs \
            --publish ".artifacts/skill-upstream/publish.json" \
            --body-file ".artifacts/skill-upstream/pr-body.md" \
            --validation ".artifacts/skill-upstream.validate.json" \
            --output ".artifacts/skill-upstream/pr-eval.json"

      - name: Post rolling work issue comment
        if: ${{ always() }}
        run: |
          set -euo pipefail
          args=(
            --repo "${{ github.repository }}"
            --issue "${{ steps.issue.outputs.number }}"
            --lane skill-upstream
            --workflow-status "${{ job.status }}"
            --run-url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          )
          if [ -n "${{ steps.request.outputs.request_title }}" ]; then
            args+=(--request-title "${{ steps.request.outputs.request_title }}")
          fi
          if [ -n "${{ steps.request.outputs.target_repo }}" ]; then
            args+=(--target-repo "${{ steps.request.outputs.target_repo }}")
          fi
          if [ -n "${{ steps.issue_ledger.outputs.ledger_revision }}" ]; then
            args+=(--ledger-revision "${{ steps.issue_ledger.outputs.ledger_revision }}")
          fi
          if [ -f ".artifacts/skill-upstream/publish.json" ]; then
            args+=(--publish-json ".artifacts/skill-upstream/publish.json")
          fi
          node scripts/post-work-issue-lane-comment.mjs "${args[@]}"

      - name: Publish evidence
        if: ${{ always() }}
        env:
          RUNX_PUBLIC_EVIDENCE_API_BASE_URL: ${{ vars.RUNX_PUBLIC_EVIDENCE_API_BASE_URL || 'https://api.runx.ai' }}
          RUNX_PUBLIC_EVIDENCE_TOKEN: ${{ secrets.RUNX_PUBLIC_EVIDENCE_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          TARGET="${{ steps.request.outputs.target_repo }}"
          if [ "$STATUS" = "success" ] && [ "${{ steps.gate.outputs.allowed }}" = "true" ]; then
            TITLE="contributed a skill upstream to ${TARGET}"
            SUMMARY="drafted and opened an upstream SKILL.md contribution PR"
          elif [ "$STATUS" = "success" ]; then
            TITLE="prepared an upstream skill proposal for ${TARGET}"
            SUMMARY="refreshed the SKILL.md proposal from the work issue ledger without opening a draft PR"
          else
            TITLE="upstream skill contribution failed for ${TARGET}"
            SUMMARY="skill-upstream lane failed during execution"
          fi
          curl --fail --silent --show-error \
            -X POST \
            -H "authorization: Bearer ${RUNX_PUBLIC_EVIDENCE_TOKEN}" \
            -H "content-type: application/json" \
            --data "$(jq -n \
              --arg title "$TITLE" --arg summary "$SUMMARY" --arg status "$STATUS" \
              --arg repo "${TARGET}" --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{events: [{kind: "aster_run", source: "github-actions", status: (if $status == "success" then "success" else "failure" end), title: $title, summary: $summary, repo: $repo, workflow: "skill-upstream", url: $url, timestamp: (now | todate), metadata: {lane: "skill-upstream", feed_channel: "main", main_feed_eligible: true}}]}')" \
            "${RUNX_PUBLIC_EVIDENCE_API_BASE_URL%/}/v1/admin/public/evidence" || true

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: skill-upstream-${{ steps.issue.outputs.number || github.event.issue.number || github.event.inputs.issue_number }}
          path: |
            .artifacts/skill-upstream
            .artifacts/skill-upstream.prepare.json
            .artifacts/skill-upstream.validate.json
