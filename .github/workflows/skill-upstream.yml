name: skill-upstream

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      target_repo:
        description: External repo to receive portable SKILL.md
        required: true
        default: nilstate/icey-cli
        type: string
      target_ref:
        description: Target repo ref to inspect
        required: true
        default: main
        type: string
      workflow:
        description: Workflow opportunity name
        required: true
        default: operator-bringup
        type: string
      mode:
        description: Upstream contribution intake mode
        required: true
        default: requested
        type: choice
        options:
          - requested
          - auto
      publish:
        description: Open or update a draft PR in the target repo
        required: true
        default: false
        type: boolean
      force:
        description: Overwrite an existing SKILL.md in the target checkout
        required: true
        default: false
        type: boolean

permissions:
  actions: write
  contents: write
  pull-requests: write

concurrency:
  group: skill-upstream-${{ inputs.target_repo }}
  cancel-in-progress: false

jobs:
  skill-upstream:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.UPSTREAM_CONTRIBUTION_TOKEN || secrets.RUNX_REPOSITORY_PAT || github.token }}
      TARGET_REPO: ${{ inputs.target_repo }}
      TARGET_REF: ${{ inputs.target_ref }}
      CONTRIBUTION_WORKFLOW: ${{ inputs.workflow }}
      CONTRIBUTION_MODE: ${{ inputs.mode }}
      SHOULD_PUBLISH: ${{ inputs.publish }}
      FORCE_WRITE: ${{ inputs.force }}
    steps:
      - name: Check out automaton
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check out target repo
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.target_repo }}
          ref: ${{ inputs.target_ref }}
          token: ${{ secrets.UPSTREAM_CONTRIBUTION_TOKEN || secrets.RUNX_REPOSITORY_PAT || github.token }}
          path: .target/repo
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure target git author
        run: |
          git -C .target/repo config user.name "auscaster"
          git -C .target/repo config user.email "100876+auscaster@users.noreply.github.com"

      - name: Prepare portable skill upstream packet
        run: |
          set -euo pipefail
          mkdir -p .artifacts
          args=(
            --target-repo-dir .target/repo
            --target-repo "$TARGET_REPO"
            --output-dir .artifacts/skill-upstream
            --workflow "$CONTRIBUTION_WORKFLOW"
            --mode "$CONTRIBUTION_MODE"
            --branch "runx/add-skill-md"
          )
          if [ "$FORCE_WRITE" = "true" ]; then
            args+=(--force)
          fi
          node scripts/prepare-skill-upstream.mjs "${args[@]}" \
            > .artifacts/skill-upstream.prepare.json
          cat .artifacts/skill-upstream.prepare.json

      - name: Validate portable skill upstream packet
        run: |
          node scripts/validate-skill-upstream.mjs \
            --target-repo-dir .target/repo \
            --artifacts-dir .artifacts/skill-upstream \
            > .artifacts/skill-upstream.validate.json
          cat .artifacts/skill-upstream.validate.json

      - name: Publish draft PR
        if: ${{ inputs.publish }}
        run: |
          set -euo pipefail
          cd .target/repo
          node "$GITHUB_WORKSPACE/scripts/publish-runx-pr.mjs" \
            --repo "$TARGET_REPO" \
            --branch "runx/add-skill-md" \
            --title "Add portable SKILL.md" \
            --commit-message "docs: add portable SKILL.md" \
            --body-file "$GITHUB_WORKSPACE/.artifacts/skill-upstream/pr-body.md" \
            > "$GITHUB_WORKSPACE/.artifacts/skill-upstream/publish.json"
          cat "$GITHUB_WORKSPACE/.artifacts/skill-upstream/publish.json"

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: skill-upstream-${{ github.run_id }}
          path: |
            .artifacts/skill-upstream
            .artifacts/skill-upstream.prepare.json
            .artifacts/skill-upstream.validate.json
