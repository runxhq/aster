name: evidence-projection-derive

on:
  schedule:
    - cron: "41 */6 * * *"
  workflow_dispatch:

permissions:
  actions: read
  contents: write
  pull-requests: write

concurrency:
  group: evidence-projection-derive
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  derive-evidence-projections:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ASTER_GH_TOKEN != '' && secrets.ASTER_GH_TOKEN || github.token }}
    steps:
      - name: Check out aster
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Configure git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Prepare rolling projection branch
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive"
          git fetch --no-tags origin main
          if git ls-remote --exit-code --heads origin runx/evidence-projection-derive >/dev/null 2>&1; then
            git fetch --no-tags origin runx/evidence-projection-derive:refs/remotes/origin/runx/evidence-projection-derive
            if ! git show refs/remotes/origin/runx/evidence-projection-derive:state/evidence-projections.json > "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/previous-state.json" 2>/dev/null; then
              rm -f "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/previous-state.json"
            fi
          fi
          git checkout -B runx/evidence-projection-derive origin/main

      - name: Derive evidence projections
        run: |
          mkdir -p .artifacts/evidence-projection-derive
          ARGS=(
            --repo-root "$GITHUB_WORKSPACE"
            --repo "${{ github.repository }}"
            --output "$GITHUB_WORKSPACE/state/evidence-projections.json"
            --report-output "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/report.json"
            --latest-batch-output "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/latest-batch-summary.json"
            --latest-batch-markdown-output "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/latest-batch-summary.md"
            --workflow-run-id "${{ github.run_id }}"
            --workflow-run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            --download-root "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/downloads"
          )
          if [ -f "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/previous-state.json" ]; then
            ARGS+=(--state-input "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/previous-state.json")
          fi
          node scripts/derive-evidence-projections.mjs "${ARGS[@]}"
          cp "$GITHUB_WORKSPACE/state/evidence-projections.json" "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/state-evidence-projections.json"
          cat "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/latest-batch-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish rolling draft PR when projections change
        run: |
          cat > "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/pr-body.md" <<'EOF'
          ## Summary

          This rolling draft PR refreshes repo-owned evidence projections from uploaded GitHub Actions artifacts.

          - canonical evidence remains the underlying receipts, run packets, and uploaded workflow artifacts
          - `history/`, `reflections/`, and target dossiers are rebuilt as compact derived projections
          - this surface intentionally updates one rolling review thread instead of opening one PR per triage event
          EOF
          printf '\n\n' >> "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/pr-body.md"
          cat "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/latest-batch-summary.md" >> "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/pr-body.md"
          node scripts/publish-runx-pr.mjs \
            --repo "${{ github.repository }}" \
            --branch "runx/evidence-projection-derive" \
            --title "[runx] refresh evidence projections" \
            --commit-message "state(evidence): refresh evidence projections" \
            --body-file "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/pr-body.md" \
            --include-change-summary-in-body \
            --force-with-lease \
            --lane evidence-projection-derive \
            > "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/publish.json"
          cat "$GITHUB_WORKSPACE/.artifacts/evidence-projection-derive/publish.json" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: evidence-projection-derive-${{ github.run_id }}
          path: .artifacts/evidence-projection-derive
