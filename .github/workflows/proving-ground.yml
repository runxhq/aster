name: proving-ground

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  proving-ground:
    runs-on: ubuntu-latest
    steps:
      - name: Check out aster
        uses: actions/checkout@v6

      - name: Check out runx OSS
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.RUNX_REPOSITORY || 'runxhq/runx' }}
          ref: ${{ vars.RUNX_REF || 'main' }}
          path: runx
          token: ${{ secrets.RUNX_REPOSITORY_PAT || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install and build runx
        id: runx
        run: bash scripts/install-runx-workspace.sh runx

      - name: Run proving-ground catalog
        env:
          RUNX_ROOT: ${{ steps.runx.outputs.repo_root }}
          ARTIFACT_DIR: ${{ github.workspace }}/aster-artifacts
          ASTER_ROOT: ${{ github.workspace }}
          PROVING_GROUND_PROFILE: minimal
        run: |
          chmod +x scripts/proving-ground.sh
          bash scripts/proving-ground.sh
          node scripts/summarize-proving-ground.mjs "$ARTIFACT_DIR" > "$ARTIFACT_DIR/summary.md"

      - name: Append workflow summary
        run: cat "${{ github.workspace }}/aster-artifacts/summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Publish evidence
        if: ${{ always() }}
        env:
          RUNX_PUBLIC_EVIDENCE_API_BASE_URL: ${{ vars.RUNX_PUBLIC_EVIDENCE_API_BASE_URL || 'https://api.runx.ai' }}
          RUNX_PUBLIC_EVIDENCE_TOKEN: ${{ secrets.RUNX_PUBLIC_EVIDENCE_TOKEN }}
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" = "success" ]; then
            TITLE="ran the proving ground"
            SUMMARY="executed bounded runx lanes to surface receipt and governance drift"
          else
            TITLE="proving ground failed"
            SUMMARY="proving-ground lane failed during execution"
          fi
          curl --fail --silent --show-error \
            -X POST \
            -H "authorization: Bearer ${RUNX_PUBLIC_EVIDENCE_TOKEN}" \
            -H "content-type: application/json" \
            --data "$(jq -n \
              --arg title "$TITLE" --arg summary "$SUMMARY" --arg status "$STATUS" \
              --arg repo "${{ github.repository }}" --arg url "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
              '{events: [{kind: "aster_run", source: "github-actions", status: (if $status == "success" then "success" else "failure" end), title: $title, summary: $summary, repo: $repo, workflow: "proving-ground", url: $url, timestamp: (now | todate), metadata: {lane: "proving-ground", feed_channel: "ops"}}]}')" \
            "${RUNX_PUBLIC_EVIDENCE_API_BASE_URL%/}/v1/admin/public/evidence" || true

      - name: Upload proving-ground artifacts
        uses: actions/upload-artifact@v7
        with:
          name: aster-proving-ground
          path: ${{ github.workspace }}/aster-artifacts
