name: proving-ground

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: read

jobs:
  proving-ground:
    runs-on: ubuntu-latest
    steps:
      - name: Check out automaton
        uses: actions/checkout@v6

      - name: Check out runx OSS
        uses: actions/checkout@v6
        with:
          repository: ${{ vars.RUNX_REPOSITORY || 'nilstate/runx' }}
          ref: ${{ vars.RUNX_REF || 'main' }}
          path: runx
          token: ${{ secrets.RUNX_REPOSITORY_PAT || github.token }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable corepack
        run: corepack enable

      - name: Install and build runx
        run: |
          pnpm --dir runx install --no-frozen-lockfile
          pnpm --dir runx build

      - name: Run proving-ground catalog
        env:
          RUNX_ROOT: ${{ github.workspace }}/runx
          ARTIFACT_DIR: ${{ github.workspace }}/automaton-artifacts
          AUTOMATON_ROOT: ${{ github.workspace }}
          PROVING_GROUND_PROFILE: minimal
        run: |
          chmod +x scripts/proving-ground.sh
          bash scripts/proving-ground.sh
          node scripts/summarize-proving-ground.mjs "$ARTIFACT_DIR" > "$ARTIFACT_DIR/summary.md"

      - name: Append workflow summary
        run: cat "${{ github.workspace }}/automaton-artifacts/summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload proving-ground artifacts
        uses: actions/upload-artifact@v7
        with:
          name: automaton-proving-ground
          path: ${{ github.workspace }}/automaton-artifacts
