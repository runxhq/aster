name: issue-supervisor

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: issue-supervisor-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  issue-supervisor:
    if: ${{ !startsWith(github.event.issue.title, '[skill]') }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.RUNX_WORKSPACE_PAT != '' && secrets.RUNX_WORKSPACE_PAT || github.token }}
      RUNX_CALLER_MODEL: ${{ vars.RUNX_CALLER_MODEL || 'gpt-5.4' }}
      RUNX_CALLER_REASONING_EFFORT: ${{ vars.RUNX_CALLER_REASONING_EFFORT || 'xhigh' }}
      RUNX_CALLER_MAX_ATTEMPTS: ${{ vars.RUNX_CALLER_MAX_ATTEMPTS || '3' }}
    steps:
      - name: Check lane prerequisites
        id: preflight
        env:
          HAS_OPENAI_KEY: ${{ secrets.OPENAI_API_KEY != '' }}
        run: |
          if [ "${HAS_OPENAI_KEY}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "OPENAI_API_KEY not configured; skipping issue-supervisor."
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out automaton
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.RUNX_REPOSITORY || 'auscaster/runx' }}
          ref: ${{ vars.RUNX_REF || 'main' }}
          path: .runx/runx

      - name: Set up Node.js
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable corepack
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: corepack enable

      - name: Install and build runx
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          pnpm --dir .runx/runx install --no-frozen-lockfile
          pnpm --dir .runx/runx build

      - name: Install scafld
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          curl -fsSL https://raw.githubusercontent.com/nilstate/scafld/main/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/scafld" --version

      - name: Configure git author
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run issue supervisor
        if: ${{ steps.preflight.outputs.enabled == 'true' }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p .artifacts/issue-supervisor
          ISSUE_URL="${{ github.event.issue.html_url }}"
          node scripts/runx-agent-bridge.mjs \
            --runx-root "$GITHUB_WORKSPACE/.runx/runx" \
            --receipt-dir "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/triage-receipts" \
            --trace-dir "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/triage-provider-trace" \
            --output "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/triage-result.json" \
            -- \
            skill "$GITHUB_WORKSPACE/.runx/runx/skills/support-triage" \
            --title "$ISSUE_TITLE" \
            --body "$ISSUE_BODY" \
            --source "github_issue" \
            --source_id "${{ github.event.issue.number }}" \
            --source_url "$ISSUE_URL" \
            --product_context "automaton public dogfood repository" \
            --operator_context "Act as the issue supervisor commencement gate. Always draft a user-facing triage comment. Approve issue-to-pr only when the work is bounded to one repo-scoped governed PR. Use action_decision=proceed_to_plan when objective-decompose should freeze a shared plan before mutation. Use action_decision=request_review when the issue needs discussion before planning or mutation."
          node scripts/prepare-issue-supervisor-decision.mjs \
            --input "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/triage-result.json" \
            --output "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/supervisor-decision.json"
          jq -r '.comment_body' "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/supervisor-decision.json" \
            > "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/supervisor-comment.md"
          if [ "$(jq -r '.supervisor_decision.should_start_planner' "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/supervisor-decision.json")" = "true" ]; then
            node scripts/run-issue-supervisor-plan.mjs \
              --decision "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/supervisor-decision.json" \
              --runx-root "$GITHUB_WORKSPACE/.runx/runx" \
              --receipt-dir "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/plan-receipts" \
              --trace-dir "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/plan-provider-trace" \
              --output "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/plan-result.json" \
              --comment-output "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/plan-comment.md"
            if [ -f "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/plan-comment.md" ]; then
              printf '\n\n' >> "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/supervisor-comment.md"
              cat "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/plan-comment.md" >> "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/supervisor-comment.md"
            fi
          fi
          if [ "$(jq -r '.supervisor_decision.should_start_worker' "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/supervisor-decision.json")" != "true" ]; then
            exit 0
          fi
          node scripts/run-issue-supervisor-workers.mjs \
            --decision "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/supervisor-decision.json" \
            --runx-root "$GITHUB_WORKSPACE/.runx/runx" \
            --default-repo "${{ github.repository }}" \
            --issue-number "${{ github.event.issue.number }}" \
            --issue-title "$ISSUE_TITLE" \
            --issue-body "$ISSUE_BODY" \
            --issue-url "$ISSUE_URL" \
            --scafld-bin "$HOME/.local/bin/scafld" \
            --artifact-root "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/workers" \
            --work-root "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/workspaces" \
            --output "$GITHUB_WORKSPACE/.artifacts/issue-supervisor/worker-run-summary.json"

      - name: Post supervisor issue comment
        if: ${{ steps.preflight.outputs.enabled == 'true' && always() }}
        run: |
          if [ ! -f ".artifacts/issue-supervisor/supervisor-comment.md" ]; then
            exit 0
          fi
          node scripts/post-issue-supervisor-comment.mjs \
            --repo "${{ github.repository }}" \
            --issue "${{ github.event.issue.number }}" \
            --body-file ".artifacts/issue-supervisor/supervisor-comment.md"

      - name: Upload artifacts
        if: ${{ always() && steps.preflight.outputs.enabled == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: issue-supervisor-${{ github.event.issue.number }}
          path: .artifacts/issue-supervisor
